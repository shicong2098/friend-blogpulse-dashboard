// ─── Add Single Episode Modal ───
// 增加单集（不 track 整个频道）— 粘贴小宇宙 episode 链接 / 在 xyzrank 单集榜里搜索
// 提交后：
//   1) 写入 localStorage `bp_pending_episodes`（用户可见、可重发）
//   2) POST 到本地守护进程 http://127.0.0.1:9878/episode（写入 pending_episodes.json）
//   3) 下次 pipeline 跑时会处理这些待办单集
//
// 数据源：
//   - xyzrank.eddiehe.top/hot_episodes.json — 中文播客单集热度榜（CORS-open）
//   - hot_episodes_new.json — 新势力单集
//   两者合并去重 → 共数千条候选 episode，按 postTime/playCount 排序
let _xyzEpisodesCache = null;
async function loadXyzHotEpisodes() {
  if (_xyzEpisodesCache) return _xyzEpisodesCache;
  const urls = [
    "https://xyzrank.eddiehe.top/hot_episodes.json",
    "https://xyzrank.eddiehe.top/hot_episodes_new.json",
  ];
  const all = [];
  for (const u of urls) {
    try {
      const r = await fetch(u);
      if (!r.ok) continue;
      const data = await r.json();
      // 实际 schema: { data: { episodes: [...] } }
      // 容错：也尝试常见变体（顶层数组 / items / episodes / data 是数组）
      let items = [];
      if (Array.isArray(data)) items = data;
      else if (Array.isArray(data?.episodes)) items = data.episodes;
      else if (Array.isArray(data?.items)) items = data.items;
      else if (Array.isArray(data?.data)) items = data.data;
      else if (Array.isArray(data?.data?.episodes)) items = data.data.episodes;
      else if (Array.isArray(data?.data?.items)) items = data.data.items;
      for (const it of items) all.push(it);
    } catch (e) {
      // ignore single-file failure, keep what we got
    }
  }
  // 去重（按 link 中的 episode id）
  const seen = new Set();
  const dedup = [];
  for (const it of all) {
    const m = (it.link || "").match(/\/episode\/([0-9a-fA-F]{20,32})/);
    const eid = m ? m[1] : "";
    if (!eid || seen.has(eid)) continue;
    seen.add(eid);
    dedup.push({ ...it, _eid: eid });
  }
  // 按发布时间倒序（最新优先）
  dedup.sort((a, b) => (b.postTime || "").localeCompare(a.postTime || ""));
  _xyzEpisodesCache = dedup;
  return dedup;
}

function AddEpisodeModal({ onClose, onAdded }) {
  const [tab, setTab] = useState("link"); // "link" | "search"
  const [url, setUrl] = useState("");
  const [title, setTitle] = useState("");
  const [note, setNote] = useState("");
  // 搜索 —— 双数据源：
  //   1) xyzrank hot_episodes（前端直 fetch，覆盖全网热门）
  //   2) 本地 daemon /search_episodes（按需 scrape 单个频道近期 15 集，覆盖任何已追踪频道 + catalog 命中频道）
  const [query, setQuery] = useState("");
  const [episodeCatalog, setEpisodeCatalog] = useState(null);
  const [catalogLoading, setCatalogLoading] = useState(false);
  const [catalogError, setCatalogError] = useState("");
  const [daemonResults, setDaemonResults] = useState([]);
  const [daemonSearching, setDaemonSearching] = useState(false);
  const [daemonAvailable, setDaemonAvailable] = useState(null); // null=未知 true/false=已检测

  // xiaoyuzhou episode URL: /episode/{24-char hex} 或 /episode/{20+ char hex}
  const extractEpId = (u) => {
    if (!u) return "";
    const m = u.match(/\/episode\/([0-9a-fA-F]{20,32})/);
    return m ? m[1] : "";
  };
  const epId = useMemo(() => extractEpId(url), [url]);
  const canSubmit = tab === "link" ? !!epId : false;

  // 切到搜索 tab 时：a) 懒加载 xyzrank hot_episodes b) 探测 daemon 是否在线
  useEffect(() => {
    if (tab !== "search") return;
    if (!episodeCatalog && !catalogLoading) {
      setCatalogLoading(true);
      setCatalogError("");
      loadXyzHotEpisodes()
        .then(list => { setEpisodeCatalog(list); setCatalogLoading(false); })
        .catch(e => { setCatalogError(String(e)); setCatalogLoading(false); });
    }
    if (daemonAvailable === null) {
      fetch("http://127.0.0.1:9878/status").then(r => r.ok).catch(() => false)
        .then(ok => setDaemonAvailable(!!ok));
    }
  }, [tab, episodeCatalog, catalogLoading, daemonAvailable]);

  // query 变化时（>=2 字符）→ 触发搜索（debounced 350ms）
  // 朋友版：daemon 离线 → 走云端 /api/search_episodes（Pages Function）
  useEffect(() => {
    if (tab !== "search" || !query.trim() || query.trim().length < 2) {
      setDaemonResults([]);
      return;
    }
    const handle = setTimeout(async () => {
      setDaemonSearching(true);
      // 优先本机 daemon（更快），失败/不可用 → 云端 /api/search_episodes
      const tryUrls = daemonAvailable
        ? [`http://127.0.0.1:9878/search_episodes?q=${encodeURIComponent(query.trim())}`,
           `/api/search_episodes?q=${encodeURIComponent(query.trim())}`]
        : [`/api/search_episodes?q=${encodeURIComponent(query.trim())}`];
      for (const u of tryUrls) {
        try {
          const r = await fetch(u);
          if (r.ok) {
            const data = await r.json();
            setDaemonResults(Array.isArray(data) ? data : []);
            break;
          }
        } catch {}
      }
      setDaemonSearching(false);
    }, 350);
    return () => clearTimeout(handle);
  }, [query, tab, daemonAvailable]);

  // 合并两个数据源：daemon 结果 + xyzrank hot 结果，按 eid 去重
  const searchResults = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return [];

    const seen = new Set();
    const merged = [];

    // daemon 结果优先（更全面，已经过滤）
    for (const e of daemonResults) {
      const eid = e._eid || (e.link || "").match(/\/episode\/([0-9a-fA-F]{20,32})/)?.[1];
      if (!eid || seen.has(eid)) continue;
      seen.add(eid);
      merged.push({ ...e, _eid: eid, _src: "daemon" });
    }

    // xyzrank hot 结果补充
    if (episodeCatalog) {
      for (const e of episodeCatalog) {
        const eid = e._eid;
        if (!eid || seen.has(eid)) continue;
        const t = (e.title || "").toLowerCase();
        const p = (e.podcastName || "").toLowerCase();
        if (t.includes(q) || p.includes(q)) {
          seen.add(eid);
          merged.push({ ...e, _src: "xyzrank" });
          if (merged.length >= 80) break;
        }
      }
    }

    // 按发布日期倒序
    merged.sort((a, b) => (b.postTime || b._date || "").localeCompare(a.postTime || a._date || ""));
    return merged.slice(0, 50);
  }, [episodeCatalog, query, daemonResults]);

  const pickFromSearch = (ep) => {
    setUrl(ep.link || "");
    setTitle(ep.title || "");
    setTab("link"); // 跳到链接 tab 让用户看到识别结果再确认
  };

  const handleSubmit = async () => {
    if (!epId) return;
    const item = {
      episode_id: epId,
      url: url.trim(),
      title: title.trim(),
      note: note.trim(),
      status: "pending",
      requested_at: new Date().toISOString(),
    };
    BP_RATING_DB.addPendingEpisode(item);
    let synced = false;
    try {
      const r = await fetch("http://127.0.0.1:9878/episode", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(item),
      });
      synced = r.ok;
    } catch {}
    onAdded(item, synced);
    onClose();
  };

  const inputStyle = { fontFamily: mno, fontSize: 12, color: C.text, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 10px", outline: "none", width: "100%", boxSizing: "border-box" };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", animation: "fadeIn .15s ease" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.3)", backdropFilter: "blur(6px)" }} />
      <div style={{ position: "relative", width: "min(520px,94vw)", maxHeight: "85vh", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: "18px 22px", animation: "scaleIn .2s ease", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
          <h3 style={{ fontFamily: srf, fontSize: 18, fontWeight: 600, color: C.text, margin: 0 }}>添加单集博客</h3>
        </div>
        <p style={{ fontFamily: mno, fontSize: 10, color: C.textDim, margin: "0 0 12px" }}>只处理这一集 · 不会把整个频道加进追踪列表</p>

        {/* Tab 切换 */}
        <div style={{ display: "flex", gap: 4, marginBottom: 12, background: C.surface, padding: 3, borderRadius: 6, border: `1px solid ${C.border}`, alignSelf: "flex-start" }}>
          {[{ k: "link", l: "粘贴链接" }, { k: "search", l: "搜索博客" }].map(t => (
            <button key={t.k} onClick={() => setTab(t.k)} style={{ fontFamily: mno, fontSize: 11, padding: "4px 14px", color: tab === t.k ? C.bg : C.textSec, background: tab === t.k ? C.accent : "transparent", border: "none", borderRadius: 4, cursor: "pointer", fontWeight: tab === t.k ? 600 : 400 }}>{t.l}</button>
          ))}
        </div>

        {tab === "link" ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 12 }}>
            <div>
              <label style={{ fontFamily: mno, fontSize: 10, color: C.textDim, display: "block", marginBottom: 4 }}>小宇宙单集链接 *</label>
              <input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://www.xiaoyuzhoufm.com/episode/..." style={inputStyle} autoFocus />
              {url && !epId && <div style={{ fontFamily: mno, fontSize: 10, color: "#c0392b", marginTop: 4 }}>无法识别 episode id，请检查链接</div>}
              {epId && <div style={{ fontFamily: mno, fontSize: 10, color: C.accent, marginTop: 4 }}>✓ 已识别 episode id: {epId.slice(0, 12)}…</div>}
            </div>
            <div>
              <label style={{ fontFamily: mno, fontSize: 10, color: C.textDim, display: "block", marginBottom: 4 }}>标题（可选 · 帮助记忆）</label>
              <input value={title} onChange={e => setTitle(e.target.value)} placeholder="比如：和广密聊 Coding 第二幕" style={inputStyle} />
            </div>
            <div>
              <label style={{ fontFamily: mno, fontSize: 10, color: C.textDim, display: "block", marginBottom: 4 }}>备注（可选）</label>
              <input value={note} onChange={e => setNote(e.target.value)} placeholder="为什么想看这一集？" style={inputStyle} />
            </div>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 12, minHeight: 0 }}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>
              <p style={{ fontFamily: mno, fontSize: 10, color: C.textDim, margin: 0, lineHeight: 1.6, flex: 1 }}>
                综合搜索：<a href="https://xyzrank.com/?from=itab#/hot-episodes" target="_blank" rel="noreferrer" style={{ color: C.blue, textDecoration: "none" }}>中文播客榜热度</a> + 已追踪频道近期单集
                {daemonAvailable === false && <span style={{ color: C.textDim }}> · 云端搜索（无本地 daemon 加速）</span>}
              </p>
              {(catalogLoading || daemonSearching) && <span style={{ fontFamily: mno, fontSize: 10, color: C.textDim }}>搜索中…</span>}
            </div>
            <input value={query} onChange={e => setQuery(e.target.value)} placeholder="搜索单集，如：广密、AI for Math、张小珺..." style={inputStyle} autoFocus />
            {catalogError && (
              <div style={{ fontFamily: mno, fontSize: 10, color: "#c0392b" }}>加载榜单失败：{catalogError.slice(0, 80)}</div>
            )}
            {searchResults.length > 0 && (
              <div style={{ maxHeight: 320, overflowY: "auto", border: `1px solid ${C.border}`, borderRadius: 6 }}>
                {searchResults.map((e, i) => (
                  <div key={e._eid} onClick={() => pickFromSearch(e)}
                       style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderBottom: i < searchResults.length - 1 ? `1px solid ${C.border}` : "none", cursor: "pointer", transition: "background .12s" }}
                       onMouseEnter={ev => ev.currentTarget.style.background = C.surface}
                       onMouseLeave={ev => ev.currentTarget.style.background = "transparent"}>
                    {e.logoURL ? <img src={e.logoURL} style={{ width: 32, height: 32, borderRadius: 6, objectFit: "cover", flexShrink: 0 }} /> : <div style={{ width: 32, height: 32, borderRadius: 6, background: C.surface, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🎙</div>}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: mno, fontSize: 12, fontWeight: 500, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.title}</div>
                      <div style={{ fontFamily: mno, fontSize: 10, color: C.textDim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {e.podcastName} · {e.duration ? `${e.duration} 分钟` : ""} · {(e.postTime || e._date || "").slice(0, 10)}
                        {e.playCount ? ` · ${e.playCount > 10000 ? (e.playCount/10000).toFixed(1) + "万" : e.playCount} 播放` : ""}
                      </div>
                    </div>
                    <span style={{ fontFamily: mno, fontSize: 10, color: C.accent, flexShrink: 0, fontWeight: 500 }}>选中 →</span>
                  </div>
                ))}
              </div>
            )}
            {query && !catalogLoading && !daemonSearching && searchResults.length === 0 && (
              <div style={{ fontFamily: mno, fontSize: 11, color: C.textDim, textAlign: "center", padding: "16px 0" }}>
                没找到匹配的单集 — 可以去 <a href={`https://xyzrank.com/?from=itab#/hot-episodes`} target="_blank" rel="noreferrer" style={{ color: C.blue }}>xyzrank</a> 找一下，或直接贴链接
              </div>
            )}
            {!query && !catalogLoading && (
              <div style={{ fontFamily: mno, fontSize: 11, color: C.textDim, textAlign: "center", padding: "16px 0" }}>
                输入关键词开始搜索
                {daemonAvailable === true && <div style={{ fontSize: 9, marginTop: 4, color: C.accent }}>✓ 守护进程在线 · 搜索覆盖已追踪频道近期单集</div>}
              </div>
            )}
          </div>
        )}

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, borderTop: `1px solid ${C.border}`, paddingTop: 10 }}>
          <span style={{ fontFamily: mno, fontSize: 9, color: C.textDim }}>提交后会进入待处理队列，下次自动转录会处理</span>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onClose} style={{ fontFamily: mno, fontSize: 11, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 16px", cursor: "pointer" }}>取消</button>
            <button disabled={!canSubmit} onClick={handleSubmit} style={{ fontFamily: mno, fontSize: 11, color: C.bg, background: C.accent, border: "none", borderRadius: 6, padding: "6px 16px", cursor: canSubmit ? "pointer" : "not-allowed", fontWeight: 500, opacity: canSubmit ? 1 : .5 }}>加入队列</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Preset Data ───
// 预置追踪的频道（与 blogpulse/channels.json 保持同步）
const PRESET_CHANNELS = [];  // 朋友版：初始无频道，自己加

// EP135 transcript data (233 merged paragraphs from Whisper transcription)
const PRESET_EPISODES = [];  // 朋友版：初始无 ep（episodes_index.json 占位）

// ─── Data Backup & Restore Modal ───
// 用户的评分 / 已读 / 批注 都存在浏览器 localStorage（bp_* keys）
// 这个 Modal 提供：
//   1) 当前数据状态（哪些 key、多大、几条）
//   2) 导出 .json 文件（手动备份）
//   3) 导入 .json 文件（手动恢复）
//   4) 守护进程备份历史 — 时间倒序，可预览/恢复
//   5) localStorage 滚动 snapshot 历史（守护进程离线时的备用）
//   6) 全 localStorage 扫描（用来排查"数据是不是存在别的 key 下了"）
function DataBackupModal({ onClose }) {
  const [tab, setTab] = useState("status"); // status / daemon / local / scan
  const [diagnosis, setDiagnosis] = useState([]);
  const [daemonBackups, setDaemonBackups] = useState(null); // null=未拉取 [] / [...]
  const [scanExpanded, setScanExpanded] = useState({}); // 全部扫描里展开的 key
  const [deepFound, setDeepFound] = useState(null); // 深度搜索结果（null=未运行）
  const [daemonStatus, setDaemonStatus] = useState(null);
  const [localHistory, setLocalHistory] = useState([]);
  const [previewData, setPreviewData] = useState(null);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const fileInputRef = useRef(null);

  const refresh = () => {
    setDiagnosis(BP_RATING_DB.diagnose());
    setLocalHistory(BP_BACKUP.getLocalHistory());
  };
  useEffect(() => { refresh(); }, []);
  useEffect(() => {
    if (tab !== "daemon" || daemonBackups !== null) return;
    fetch("http://127.0.0.1:9878/status").then(r => r.json()).then(s => setDaemonStatus(s)).catch(() => setDaemonStatus(null));
    fetch("http://127.0.0.1:9878/backups").then(r => r.json()).then(d => setDaemonBackups(Array.isArray(d) ? d : [])).catch(() => setDaemonBackups([]));
  }, [tab, daemonBackups]);

  const handleExport = () => {
    const payload = BP_RATING_DB.exportAll();
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `blogpulse_backup_${new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    setMsg("✓ 已导出当前数据到下载文件夹");
  };
  const handleImportFile = (file, mode) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const payload = JSON.parse(reader.result);
        const r = BP_RATING_DB.importAll(payload, mode);
        BP_BACKUP.flush();
        setMsg(`✓ 导入完成：写入 ${r.written} 个 key，跳过 ${r.skipped}（${mode === "smart" ? "智能合并" : mode === "merge" ? "仅补缺" : "全覆盖"}）`);
        refresh();
      } catch (e) {
        setMsg(`✗ 导入失败：${e.message}`);
      }
    };
    reader.readAsText(file);
  };
  const handleRestoreFromDaemon = async (name, mode) => {
    setBusy(true);
    try {
      const r = await fetch(`http://127.0.0.1:9878/backup?name=${encodeURIComponent(name)}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const payload = await r.json();
      setPreviewData({ name, payload, mode });
    } catch (e) {
      setMsg(`✗ 读取失败：${e.message}`);
    }
    setBusy(false);
  };
  const handleRestoreFromLocalSnapshot = (snap, mode) => {
    setPreviewData({ name: `本地 snapshot · ${new Date(snap.ts).toLocaleString()}`, payload: { ts: snap.ts, data: snap.data }, mode });
  };
  const confirmRestore = () => {
    if (!previewData) return;
    const r = BP_RATING_DB.importAll(previewData.payload, previewData.mode);
    BP_BACKUP.flush();
    setMsg(`✓ 恢复完成：写入 ${r.written} 个 key，跳过 ${r.skipped}`);
    setPreviewData(null);
    refresh();
  };

  const fmtSize = (b) => b > 1024 ? `${(b/1024).toFixed(1)} KB` : `${b} B`;
  const tabBtnStyle = (k) => ({ fontFamily: mno, fontSize: 11, padding: "5px 12px", color: tab === k ? C.bg : C.textSec, background: tab === k ? C.accent : "transparent", border: "none", borderRadius: 4, cursor: "pointer", fontWeight: tab === k ? 600 : 400 });

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", animation: "fadeIn .15s ease" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.4)", backdropFilter: "blur(6px)" }} />
      <div style={{ position: "relative", width: "min(680px,96vw)", maxHeight: "90vh", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: "18px 22px", animation: "scaleIn .2s ease", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <h3 style={{ fontFamily: srf, fontSize: 18, fontWeight: 600, color: C.text, margin: 0 }}>数据备份与恢复</h3>
          <button onClick={onClose} style={{ fontFamily: mno, fontSize: 14, color: C.textDim, background: "none", border: "none", cursor: "pointer", padding: 0 }}>✕</button>
        </div>
        <p style={{ fontFamily: mno, fontSize: 10, color: C.textDim, margin: "0 0 12px", lineHeight: 1.6 }}>评分 / 已读 / 批注 / 待处理单集都存在浏览器 localStorage 里。每次修改自动同步到本地守护进程文件夹（防丢）。</p>

        <div style={{ display: "flex", gap: 4, marginBottom: 12, background: C.surface, padding: 3, borderRadius: 6, border: `1px solid ${C.border}`, alignSelf: "flex-start" }}>
          <button onClick={() => setTab("status")} style={tabBtnStyle("status")}>当前状态</button>
          <button onClick={() => setTab("daemon")} style={tabBtnStyle("daemon")}>守护进程历史</button>
          <button onClick={() => setTab("local")} style={tabBtnStyle("local")}>本地 snapshot</button>
          <button onClick={() => setTab("scan")} style={tabBtnStyle("scan")}>全部扫描</button>
        </div>

        <div style={{ flex: 1, overflowY: "auto", minHeight: 0, marginBottom: 12 }}>
          {tab === "status" && (
            <div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                <button onClick={handleExport} style={{ fontFamily: mno, fontSize: 11, color: C.bg, background: C.accent, border: "none", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontWeight: 500 }}>⬇ 导出 .json 备份</button>
                <input ref={fileInputRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={e => {
                  const f = e.target.files?.[0]; if (!f) return;
                  const mode = window.confirm("智能合并：保留你现有数据，从备份中补充缺失项（推荐）？\n\n点【确定】= 智能合并\n点【取消】= 全部覆盖（旧数据会丢）") ? "smart" : "replace";
                  handleImportFile(f, mode); e.target.value = "";
                }} />
                <button onClick={() => fileInputRef.current?.click()} style={{ fontFamily: mno, fontSize: 11, color: C.accent, background: C.bg, border: `1px solid ${C.accent}`, borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontWeight: 500 }}>⬆ 从 .json 导入</button>
                <button onClick={() => { BP_BACKUP.flush(); setMsg("✓ 已强制同步到守护进程"); }} style={{ fontFamily: mno, fontSize: 11, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 14px", cursor: "pointer" }}>🔄 立即同步到守护进程</button>
              </div>

              {/* bp_ keys 状态表 */}
              <div style={{ border: `1px solid ${C.border}`, borderRadius: 6, overflow: "hidden" }}>
                <div style={{ display: "grid", gridTemplateColumns: "200px 80px 1fr", gap: 8, padding: "6px 10px", background: C.surface, fontFamily: mno, fontSize: 10, fontWeight: 600, color: C.textSec, borderBottom: `1px solid ${C.border}` }}>
                  <span>localStorage Key</span><span style={{ textAlign: "right" }}>大小</span><span>内容</span>
                </div>
                {diagnosis.filter(d => d.key.startsWith("bp_") || d.key.startsWith("bp-")).map(d => (
                  <div key={d.key} style={{ display: "grid", gridTemplateColumns: "200px 80px 1fr", gap: 8, padding: "5px 10px", fontFamily: mno, fontSize: 11, color: C.text, borderBottom: `1px solid ${C.border}` }}>
                    <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.key}</span>
                    <span style={{ textAlign: "right", color: C.textDim }}>{fmtSize(d.size)}</span>
                    <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", color: C.textSec }}>{d.summary}</span>
                  </div>
                ))}
                {diagnosis.filter(d => d.key.startsWith("bp_") || d.key.startsWith("bp-")).length === 0 && (
                  <div style={{ padding: "20px", textAlign: "center", fontFamily: mno, fontSize: 11, color: C.textDim }}>没有任何 bp_ 数据 — 这是新浏览器/profile？建议从守护进程或文件恢复</div>
                )}
              </div>
            </div>
          )}

          {tab === "daemon" && (
            <div>
              <p style={{ fontFamily: mno, fontSize: 10, color: C.textDim, margin: "0 0 10px", lineHeight: 1.6 }}>
                每次修改自动 POST 完整快照到 <code style={{ background: C.surface, padding: "1px 4px", borderRadius: 3 }}>blogpulse/user_data_backups/</code>。
                <b style={{ color: C.text }}> latest.json + daily_*.json 永久保留</b>（每天一份，10 年也不到 1 GB）·
                snapshot_*.json（每小时一份）保留 1 年。
                因为每份是 *完整快照*，你现存的笔记永远都在最新的 daily 文件里。
              </p>
              {daemonStatus === null && <div style={{ fontFamily: mno, fontSize: 11, color: "#c0392b", padding: "12px 0" }}>⚠️ 无法连接守护进程（http://127.0.0.1:9878）— 请确认 daemon.pyw 在跑</div>}
              {daemonStatus && daemonBackups !== null && (
                <>
                  <div style={{ fontFamily: mno, fontSize: 10, color: C.accent, marginBottom: 10 }}>✓ 守护进程在线 · 备份文件夹有 {daemonBackups.length} 份</div>

              <p style={{ fontFamily: mno, fontSize: 10, color: C.textDim, margin: "0 0 10px", lineHeight: 1.6 }}>

              </p>
              <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                <button onClick={() => {
                  // 深度搜索：扫每个 key 的 value，找批注/已读/评分 形状的数据
                  const found = [];
                  for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    const v = localStorage.getItem(k) || "";
                    if (!v) continue;
                    // 形状 1：批注 — 有 "text":"..." + "note":"..." 同时出现
                    const annMatches = v.match(/"text":"[^"]{3,}"[^}]*"note":"/g);
                    if (annMatches) found.push({ k, kind: "批注 (annotation)", count: annMatches.length });
                    // 形状 2：已读 — "readAt":数字
                    const readMatches = v.match(/"readAt":\d{10,}/g);
                    if (readMatches) found.push({ k, kind: "已读 (read marker)", count: readMatches.length });
                    // 形状 3：评分对象 — "preset-ep_xxx":1/2/3 的模式
                    const ratingMatches = v.match(/"preset-[^"]+":[123]\b/g);
                    if (ratingMatches) found.push({ k, kind: "评分 (rating)", count: ratingMatches.length });
                  }
                  setDeepFound(found);
                }} style={{ fontFamily: mno, fontSize: 11, color: C.bg, background: C.accent, border: "none", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontWeight: 500 }}>🔍 深度搜索笔记/评分/已读形状</button>
                {Object.keys(scanExpanded).length > 0 && <button onClick={() => setScanExpanded({})} style={{ fontFamily: mno, fontSize: 11, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 14px", cursor: "pointer" }}>收起全部</button>}
              </div>

                  {deepFound.length === 0
                    ? <span style={{ fontFamily: mno, fontSize: 11, color: C.textDim }}>✓ 全部 value 扫描完毕，没有发现批注/已读/评分形状的数据藏在别的 key 里</span>
                    : <div>
                        <div style={{ fontFamily: mno, fontSize: 11, color: "#7a4f0f", fontWeight: 600, marginBottom: 6 }}>⚠️ 发现 {deepFound.length} 处疑似用户数据藏在 value 内：</div>
                        {deepFound.map((f, i) => (
                          <div key={i} style={{ fontFamily: mno, fontSize: 11, color: "#7a4f0f", padding: "2px 0" }}>
                            • <code>{f.k}</code> 内含 <b>{f.count}</b> 条 {f.kind} → 点下方该 key 的"展开"看具体内容
                          </div>
                        ))}
                      </div>

              <div style={{ border: `1px solid ${C.border}`, borderRadius: 6, overflow: "hidden", maxHeight: 400, overflowY: "auto" }}>
                <div style={{ display: "grid", gridTemplateColumns: "200px 70px 1fr 50px", gap: 8, padding: "6px 10px", background: C.surface, fontFamily: mno, fontSize: 10, fontWeight: 600, color: C.textSec, borderBottom: `1px solid ${C.border}` }}>
                  <span>Key</span><span style={{ textAlign: "right" }}>大小</span><span>内容</span><span></span>
                </div>
                {diagnosis.map(d => {
                  const expanded = !!scanExpanded[d.key];
                  return (
                    <div key={d.key} style={{ borderBottom: `1px solid ${C.border}` }}>
                      <div style={{ display: "grid", gridTemplateColumns: "200px 70px 1fr 50px", gap: 8, padding: "5px 10px", fontFamily: mno, fontSize: 11, color: C.text }}>
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.key}</span>
                        <span style={{ textAlign: "right", color: C.textDim }}>{fmtSize(d.size)}</span>
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", color: C.textSec }}>{d.summary}</span>
                        <button onClick={() => setScanExpanded(prev => { const n = { ...prev }; if (expanded) delete n[d.key]; else n[d.key] = true; return n; })} style={{ fontFamily: mno, fontSize: 9, color: C.accent, background: C.bg, border: `1px solid ${C.accent}`, borderRadius: 4, padding: "1px 6px", cursor: "pointer" }}>{expanded ? "收起" : "展开"}</button>
                      </div>

                        <div style={{ background: C.surface, padding: "8px 12px", fontFamily: mno, fontSize: 10, color: C.text, whiteSpace: "pre-wrap", wordBreak: "break-all", maxHeight: 280, overflowY: "auto", borderTop: `1px solid ${C.border}` }}>
                          {(() => {

              {Object.entries(previewData.payload.data || {}).map(([k, v]) => {
                let summary = "";
                try { const p = JSON.parse(v); summary = Array.isArray(p) ? `${p.length} 条` : (p && typeof p === "object" ? `${Object.keys(p).length} 键` : String(p).slice(0, 40)); }
                catch { summary = String(v).slice(0, 40); }
                return <div key={k} style={{ padding: "2px 0" }}><b>{k}</b> · {summary}</div>;

            <div style={{ fontFamily: mno, fontSize: 10, color: C.textDim, lineHeight: 1.6 }}>

// ─── Correction Modal ───
// 用户更正一个词时弹出：原词 → 输入正确写法 → 自动分类 → 预览本集所有同样的错误处 → 确认应用
// 应用后：
//   1. 写入 BP_RATING_DB.addCorrection(epId) 触发 summary/transcript 重新渲染
//   2. POST 到本地 daemon /correction（如果在线）→ daemon 写进 vocabulary.json 的 user_added
//   3. 自动批量 fix 同集所有相同 occurrence
function CorrectionModal({ epId, original, location, summaryText, transcriptSegments, onClose, onApplied }) {
  const [corrected, setCorrected] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const inputRef = useRef(null);
  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 50); }, []);

  // 自动分类
  const classification = useMemo(() => bpClassifyCorrection(corrected), [corrected]);

  // 统计本集 summary + transcript 里 original 出现的次数
  const occurrences = useMemo(() => {
    const inSummary = summaryText ? bpCountOccurrences(summaryText, original) : 0;
    const inTranscript = (transcriptSegments || []).reduce((sum, s) => sum + bpCountOccurrences(s.text || "", original), 0);
    return { inSummary, inTranscript, total: inSummary + inTranscript };
  }, [original, summaryText, transcriptSegments]);

  const canSubmit = !!corrected && corrected.trim() !== original.trim() && !submitting;

  const submit = async () => {
    if (!canSubmit) return;
    setSubmitting(true);
    const item = {
      original: original.trim(),
      corrected: corrected.trim(),
      type: classification.type,
      is_proper_noun: classification.isProperNoun,
      location, // "summary" | "transcript"
      applied_count: occurrences.total,
    };
    BP_RATING_DB.addCorrection(epId, item);
    // POST to daemon (best-effort，离线也无所谓——本地 corrections 已存)
    try {
      await fetch("http://127.0.0.1:9878/correction", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...item, ep_id: epId }),
      });
    } catch {}
    onApplied?.(item);
    onClose();
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1100, display: "flex", alignItems: "center", justifyContent: "center", animation: "fadeIn .15s ease" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.4)", backdropFilter: "blur(6px)" }} />
      <div style={{ position: "relative", width: "min(540px,94vw)", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: "18px 22px", animation: "scaleIn .2s ease", display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <h3 style={{ fontFamily: srf, fontSize: 16, fontWeight: 600, color: C.text, margin: 0 }}>更正词汇</h3>
          <button onClick={onClose} style={{ fontFamily: mno, fontSize: 14, color: C.textDim, background: "none", border: "none", cursor: "pointer", padding: 0 }}>✕</button>
        </div>

        {/* 原词 → 正确词 */}
        <div>
          <label style={{ fontFamily: mno, fontSize: 10, color: C.textDim, display: "block", marginBottom: 4 }}>原文</label>
          <div style={{ fontFamily: srf, fontSize: 14, color: C.text, padding: "6px 10px", background: "#fff5e6", border: "1px solid #f0d294", borderRadius: 5 }}>{original}</div>
        </div>
        <div>
          <label style={{ fontFamily: mno, fontSize: 10, color: C.textDim, display: "block", marginBottom: 4 }}>正确写法</label>
          <input ref={inputRef} value={corrected} onChange={e => setCorrected(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && canSubmit) submit(); }}
            placeholder="输入正确的写法…"
            style={{ fontFamily: srf, fontSize: 14, color: C.text, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 5, padding: "6px 10px", outline: "none", width: "100%", boxSizing: "border-box" }} />
        </div>

        {/* 自动分类 */}
        {corrected && (
          <div style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: mno, fontSize: 11 }}>
            <span style={{ color: C.textDim }}>识别为:</span>
            <span style={{
              padding: "2px 8px", borderRadius: 10,
              color: classification.isProperNoun ? C.bg : C.textSec,
              background: classification.isProperNoun ? C.accent : C.surface,
              border: `1px solid ${classification.isProperNoun ? C.accent : C.border}`,
              fontWeight: 600,
            }}>{classification.label}</span>
            {classification.isProperNoun && <span style={{ fontSize: 10, color: C.textDim }}>· 将自动加入名词库（下次转录优先用这个拼写）</span>}
          </div>
        )}

        {/* 同集 occurrence 预览 */}
        {corrected && occurrences.total > 0 && (
          <div style={{ background: "#fef9ed", border: "1px solid #f0d294", borderRadius: 6, padding: "10px 12px", fontFamily: mno, fontSize: 11, color: "#7a4f0f", lineHeight: 1.6 }}>
            <div style={{ fontWeight: 600, marginBottom: 4 }}>本集还发现 {occurrences.total} 处相同的「{original}」：</div>
            <div style={{ paddingLeft: 4 }}>
              · 总结里 <b>{occurrences.inSummary}</b> 处<br/>
              · 转录里 <b>{occurrences.inTranscript}</b> 处<br/>
            </div>
            <div style={{ marginTop: 6, color: "#9a6e1d" }}>提交后 <b>全部一并修正</b>。</div>
          </div>
        )}
        {corrected && occurrences.total === 0 && (
          <div style={{ fontFamily: mno, fontSize: 10, color: C.textDim, padding: "4px 0" }}>本集没有其他相同 occurrence，仅这一处更正。</div>
        )}

        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, borderTop: `1px solid ${C.border}`, paddingTop: 10 }}>
          <button onClick={onClose} style={{ fontFamily: mno, fontSize: 11, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 16px", cursor: "pointer" }}>取消</button>
          <button disabled={!canSubmit} onClick={submit} style={{ fontFamily: mno, fontSize: 11, color: C.bg, background: "#b45309", border: "none", borderRadius: 6, padding: "6px 16px", cursor: canSubmit ? "pointer" : "not-allowed", fontWeight: 500, opacity: canSubmit ? 1 : .5 }}>{submitting ? "保存中…" : `✎ 应用更正${occurrences.total > 0 ? ` (${occurrences.total + 1})` : ""}`}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ───
function BlogPulse() {
  const [channels, setChannels] = useState([]);
  const [episodes, setEpisodes] = useState([]);
  const [showAdd, setShowAdd] = useState(false);
  const [showAddEpisode, setShowAddEpisode] = useState(false);
  const [showBackup, setShowBackup] = useState(false);
  const [pendingEpisodes, setPendingEpisodes] = useState(() => BP_RATING_DB.getPendingEpisodes());
  const [detailEp, setDetailEp] = useState(null);
  const [showChannels, setShowChannels] = useState(false);
  const [selectedChannelId, setSelectedChannelId] = useState(null); // null = 全部，否则只显示该频道
  const [loading, setLoading] = useState(true);
  const [busyId, setBusyId] = useState(null);
  const [toast, setToast] = useState(null);
  const [showDebug, setShowDebug] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [, fu] = useState(0);
  const chRef = useRef([]);
  const epRef = useRef([]);

  // ─── URL 路由（hash-based，静态托管友好）───
  // #/                       → 主页（剧集列表）
  // #/episode/{episode_id}   → 单集详情
  // #/channels               → 追踪频道页
  // 每集都有独立的可分享 URL；浏览器返回按钮天然工作
  const writeHash = useCallback((target) => {
    if (window.location.hash !== target) {
      // 直接赋 hash 会触发 hashchange，applyRoute 会同步状态
      window.location.hash = target;
    }
  }, []);
  const navToEpisode = useCallback((ep) => {
    // 立即更新 state（避免等 hashchange 的细微闪烁），同时写 hash
    setDetailEp(ep);
    if (ep) setShowChannels(false);
    writeHash(ep ? "#/episode/" + encodeURIComponent(ep._id) : "#/");
  }, [writeHash]);
  const navToChannels = useCallback((show) => {
    setShowChannels(show);
    if (show) setDetailEp(null);
    writeHash(show ? "#/channels" : "#/");
  }, [writeHash]);

  // 监听浏览器返回/前进/手输地址 → 同步 state
  const applyRoute = useCallback(() => {
    const h = (window.location.hash || "").replace(/^#\/?/, "");
    if (h.startsWith("episode/")) {
      const id = decodeURIComponent(h.slice("episode/".length));
      const ep = epRef.current.find(e => e._id === id);
      if (ep) {
        setDetailEp(ep);
        setShowChannels(false);
      } else if (epRef.current.length > 0) {
        // episodes 已加载但找不到该 id → 回主页（链接失效）
        setDetailEp(null);
        // 不修改 hash — 让用户看到"找不到"再决定
      }
      // episodes 还没加载完时不动，等下面那个 effect 再 applyRoute
    } else if (h === "channels") {
      setDetailEp(null);
      setShowChannels(true);
    } else {
      setDetailEp(null);
      setShowChannels(false);
    }
  }, []);
  // 跨电脑同步：fetch 部署的 user_data_sync.json → smart-merge 进本地 localStorage
  // 这样 A 电脑改的批注/评分/已读，B/C 电脑刷新就能看到（30-60s 延迟，等 Cloudflare 部署）
  useEffect(() => {
    let stopped = false;
    const SYNC_KEYS_FLAT = ["bp_user_ratings", "bp_reads", "bp_learned_weights"];
    const SYNC_KEYS_LIST_BY_ID = ["bp_annotations", "bp_corrections"];  // {epId: [items], dedup by id/key}
    const parseOr = (s, def) => { try { return JSON.parse(s || "null") || def; } catch { return def; } };

    const syncFromCloud = async () => {
      try {
        // Prefer KV-backed /api/user-data (instant, <100ms write→read);
        // fall back to static user_data_sync.json (daemon-pushed via git, ~30s lag).
        // Note: ABSOLUTE path '/api/user-data' — relative './api/user-data' would
        // resolve to '/blogpulse/api/user-data' which doesn't exist as a Function
        // and triggers the Pages SPA fallback (returns Dashboard Hub HTML),
        // causing the JSON parse below to fail and the fallback never to run.
        let r;
        let payloadOk = false;
        try {
          r = await fetch(`/api/user-data?bust=${Date.now()}`);
          if (!r.ok) throw new Error(`api ${r.status}`);
          const ct = r.headers.get('content-type') || '';
          if (!ct.includes('json')) throw new Error(`api wrong content-type: ${ct}`);
          payloadOk = true;
        } catch (e) {
          // Try static file as fallback
          r = await fetch(`./user_data_sync.json?bust=${Date.now()}`);
          if (!r.ok) return;
        }
        const payload = await r.json();
        if (stopped) return;
        const remote = payload?.data || {};
        if (!remote || !Object.keys(remote).length) return;
        let changed = 0;
        // ratings / reads / learned_weights: flat dict, remote 补缺（local 已有的不覆盖，避免本地最新被旧远程覆盖）
        for (const k of SYNC_KEYS_FLAT) {
          const local = parseOr(localStorage.getItem(k), {});
          const remoteObj = parseOr(remote[k], {});
          const merged = { ...remoteObj, ...local };  // local wins
          if (JSON.stringify(merged) !== JSON.stringify(local)) {
            localStorage.setItem(k, JSON.stringify(merged));
            changed++;
          }
        }
        // pending_episodes: array, 按 episode_id 并集
        {
          const local = parseOr(localStorage.getItem("bp_pending_episodes"), []);
          const remoteArr = parseOr(remote["bp_pending_episodes"], []);
          const seen = new Set(local.map(p => p.episode_id));
          const extras = remoteArr.filter(p => !seen.has(p.episode_id));
          if (extras.length) {
            localStorage.setItem("bp_pending_episodes", JSON.stringify([...local, ...extras]));
            changed++;
          }
        }
        // annotations: {epId: [items]}, dedup by id
        {
          const local = parseOr(localStorage.getItem("bp_annotations"), {});
          const remoteObj = parseOr(remote["bp_annotations"], {});
          const merged = { ...local };
          let added = 0;
          for (const [epId, list] of Object.entries(remoteObj)) {
            const localList = merged[epId] || [];
            const seen = new Set(localList.map(x => x.id));
            const extra = list.filter(x => !seen.has(x.id));
            if (extra.length) { merged[epId] = [...localList, ...extra]; added += extra.length; }
            else if (!merged[epId]) merged[epId] = list;
          }
          if (added) { localStorage.setItem("bp_annotations", JSON.stringify(merged)); changed++; }
        }
        // corrections: {epId: [items]}, dedup by (original, corrected)
        {
          const local = parseOr(localStorage.getItem("bp_corrections"), {});
          const remoteObj = parseOr(remote["bp_corrections"], {});
          const merged = { ...local };
          let added = 0;
          for (const [epId, list] of Object.entries(remoteObj)) {
            const localList = merged[epId] || [];
            const seen = new Set(localList.map(x => `${x.original}→${x.corrected}`));
            const extra = list.filter(x => !seen.has(`${x.original}→${x.corrected}`));
            if (extra.length) { merged[epId] = [...localList, ...extra]; added += extra.length; }
            else if (!merged[epId]) merged[epId] = list;
          }
          if (added) { localStorage.setItem("bp_corrections", JSON.stringify(merged)); changed++; }
        }
        // expansions: {epId: {chapter_key: data}}, latest ts wins
        {
          const local = parseOr(localStorage.getItem("bp_expansions"), {});
          const remoteObj = parseOr(remote["bp_expansions"], {});
          const merged = { ...local };
          let added = 0;
          for (const [epId, chapMap] of Object.entries(remoteObj)) {
            if (!merged[epId]) { merged[epId] = chapMap; added++; continue; }
            for (const [ch, data] of Object.entries(chapMap)) {
              const a = merged[epId][ch];
              if (!a) { merged[epId][ch] = data; added++; }
              else if ((data.ts || 0) > (a.ts || 0)) { merged[epId][ch] = data; added++; }
            }
          }
          if (added) { localStorage.setItem("bp_expansions", JSON.stringify(merged)); changed++; }
        }
        // bp_channel_actions: list of {id, type, status, payload, ts}
        // 远端会把 status 推到 done/error；本地清理已完成且 expansion/channel 已就位的
        {
          const local = parseOr(localStorage.getItem("bp_channel_actions"), []);
          const remoteArr = parseOr(remote["bp_channel_actions"], []);
          const rank = { done: 3, error: 3, processing: 2, pending: 1 };
          const map = {};
          for (const x of [...local, ...remoteArr]) {
            if (!x || !x.id) continue;
            const cur = map[x.id];
            if (!cur) { map[x.id] = x; continue; }
            const a = rank[cur.status || "pending"] || 0;
            const b = rank[x.status || "pending"] || 0;
            if (b > a || (b === a && (x.ts||0) > (cur.ts||0))) map[x.id] = x;
          }
          // 清理 1 分钟以上的 done 动作（短保留期，避免 UI 闪烁）
          const now = Date.now();
          const merged = Object.values(map).filter(x => {
            if (x.status === "done" && (now - (x.completed_at || x.ts || 0)) > 60000) return false;
            if (x.status === "error" && (now - (x.completed_at || x.ts || 0)) > 86400000) return false;
            return true;
          });
          if (JSON.stringify(merged) !== JSON.stringify(local)) {
            localStorage.setItem("bp_channel_actions", JSON.stringify(merged));
            changed++;
          }
        }
        // expand_pending: {epId: {chapter_key: {status, ...}}}
        // 主电脑 worker 处理完会把 status 改成 'done'/'error'；前端遇到 done 且 expansion 已就位 → 删掉 pending
        {
          const local = parseOr(localStorage.getItem("bp_expand_pending"), {});
          const remoteObj = parseOr(remote["bp_expand_pending"], {});
          const expansionsLocal = parseOr(localStorage.getItem("bp_expansions"), {});
          const merged = { ...local };
          let touched = 0;
          // 用 remote 状态更新本地（status 升级 / 新加入）
          for (const [epId, chapMap] of Object.entries(remoteObj)) {
            if (!merged[epId]) merged[epId] = {};
            for (const [ch, task] of Object.entries(chapMap)) {
              const a = merged[epId][ch];
              if (!a) { merged[epId][ch] = task; touched++; continue; }
              // status 优先级 done/error > processing > pending；同 status 取新 ts
              const rank = { done: 3, error: 3, processing: 2, pending: 1 };
              const ar = rank[a.status || "pending"] || 0;
              const br = rank[task.status || "pending"] || 0;
              if (br > ar) { merged[epId][ch] = task; touched++; }
              else if (br === ar && (task.requested_at || 0) > (a.requested_at || 0)) { merged[epId][ch] = task; touched++; }
            }
          }
          // 清理：done 且 expansion 已就位 / error 任务保留 24h 后清理
          const now = Date.now();
          for (const [epId, chapMap] of Object.entries(merged)) {
            for (const ch of Object.keys(chapMap)) {
              const t = chapMap[ch];
              if (t?.status === "done" && expansionsLocal[epId]?.[ch]) {
                delete chapMap[ch]; touched++;
              } else if (t?.status === "error" && (now - (t.errored_at || t.requested_at || 0)) > 86400000) {
                delete chapMap[ch]; touched++;
              }
            }
            if (!Object.keys(chapMap).length) delete merged[epId];
          }
          if (touched) { localStorage.setItem("bp_expand_pending", JSON.stringify(merged)); changed++; }
        }
        if (changed) {
          fu(n => n + 1);  // 触发组件重渲染显示新合并的数据
        }
      } catch {}
    };
    syncFromCloud();  // 启动时立即拉一次
    const t = setInterval(syncFromCloud, 60 * 1000);
    return () => { stopped = true; clearInterval(t); };
  }, []);

  // 启动时同步 daemon 的 /retranscribe_jobs → 本地 bp_retranscribing
  // 让"转录中"badge 在 dashboard 重启后还能正确显示
  useEffect(() => {
    let stopped = false;
    const syncJobs = async () => {
      let jobs = null;
      let source = null;
      // 1) 本机 daemon（最快、最准）— 仅在跑 daemon 的那台机器上能连上
      try {
        const r = await fetch("http://127.0.0.1:9878/retranscribe_jobs");
        if (r.ok) { jobs = await r.json(); source = "daemon"; }
      } catch {}
      // 2) Fallback: 已部署的 retranscribe_active.json — 任何浏览器都能拿
      //    daemon 在 spawn / 完成时会写这个文件 + git push，Cloudflare 部署后所有人可见
      if (jobs === null) {
        try {
          const r = await fetch(`./retranscribe_active.json?bust=${Date.now()}`);
          if (r.ok) {
            const data = await r.json();
            jobs = data.jobs || {};
            source = "public";
          }
        } catch {}
      }
      if (jobs === null) return;
      try {
        if (stopped) return;
        const localState = BP_RATING_DB._get("retranscribing", {});
        const liveEpIds = new Set();
        for (const [epId, info] of Object.entries(jobs)) {
          // ep_id 在 daemon/json 里都没 preset- 前缀，dashboard 这边都是 preset-{ep_id}
          const dashId = epId.startsWith("preset-") ? epId : `preset-${epId}`;
          liveEpIds.add(dashId);
          if (!localState[dashId] || localState[dashId].model !== info.model) {
            BP_RATING_DB.setRetranscribing(dashId, { pid: info.pid, log: info.log, model: info.model || "gpt-4o-hybrid" });
          }
        }
        // 清理：本地有但当前 source 显示已无的 epId
        for (const k of Object.keys(localState)) {
          if (!liveEpIds.has(k)) {
            if (source === "public") {
              // public JSON 是权威——daemon push 它的更新即代表 jobs 状态。立即清理
              BP_RATING_DB.clearRetranscribing(k);
            } else {
              // daemon 源：留 5min 容忍期（应付 daemon 还没注册新 spawn 的瞬间）
              const age = Date.now() - (localState[k].ts || 0);
              if (age > 5 * 60 * 1000) BP_RATING_DB.clearRetranscribing(k);
            }
          }
        }
        fu(n => n + 1);  // 触发重渲染
      } catch {}
    };
    syncJobs();  // 启动时跑一次
    const t = setInterval(syncJobs, 60 * 1000);  // 每 60s 同步一次
    return () => { stopped = true; clearInterval(t); };
  }, []);

  useEffect(() => {
    window.addEventListener("hashchange", applyRoute);
    return () => window.removeEventListener("hashchange", applyRoute);
  }, [applyRoute]);

  // 自动恢复检测：本地无 bp_ 用户数据 → 探测守护进程 latest.json → 提示用户恢复
  // 只在第一次 mount 时检查，避免反复弹窗
  const [restoreOffer, setRestoreOffer] = useState(null); // null | {payload, name}
  useEffect(() => {
    const hasUserData = !!localStorage.getItem("bp_user_ratings")
                     || !!localStorage.getItem("bp_reads")
                     || !!localStorage.getItem("bp_annotations");
    if (hasUserData) return;
    fetch("http://127.0.0.1:9878/backup?name=latest.json")
      .then(r => r.ok ? r.json() : null)
      .then(payload => {
        if (!payload || !payload.data) return;
        // 备份里有真东西才提示
        const meaningful = ["bp_user_ratings", "bp_reads", "bp_annotations"].some(k => {
          try { const v = JSON.parse(payload.data[k] || "null"); return v && (Array.isArray(v) ? v.length : Object.keys(v).length); }
          catch { return false; }
        });
        if (meaningful) setRestoreOffer({ payload, name: "latest.json" });
      })
      .catch(() => {});
  }, []);

  const acceptRestore = () => {
    if (!restoreOffer) return;
    const r = BP_RATING_DB.importAll(restoreOffer.payload, "smart");
    BP_BACKUP.flush();
    showToast(`✓ 已从守护进程恢复 ${r.written} 个 key（${restoreOffer.name}）`, "success");
    setRestoreOffer(null);
    // 触发组件重新读取
    setTimeout(() => window.location.reload(), 800);
  };
  const dismissRestore = () => setRestoreOffer(null);

  // 在已存在 episodes 中清掉 pending — 一旦该单集真的进了 PRESET_EPISODES，状态视为 done
  useEffect(() => {
    if (!episodes.length || !pendingEpisodes.length) return;
    const prefix = "preset-ep_";
    const epIdSet = new Set(episodes.map(e => (e._id || "").replace(prefix, "")));
    let changed = false;
    const updated = pendingEpisodes.map(p => {
      // pending.episode_id 是小宇宙 24-char eid；preset id 是 ep_{eid前8位}
      const shortId = (p.episode_id || "").slice(0, 8);
      const matched = [...epIdSet].some(id => id.startsWith(shortId));
      if (matched && p.status !== "done") { changed = true; return { ...p, status: "done" }; }
      return p;
    });
    if (changed) {
      BP_RATING_DB.savePendingEpisodes(updated);
      setPendingEpisodes(updated);
    }
  }, [episodes, pendingEpisodes]);

  useEffect(() => { chRef.current = channels; }, [channels]);
  useEffect(() => { epRef.current = episodes; }, [episodes]);

  const showToast = (m, t = "info") => { setToast({ m, t }); setTimeout(() => setToast(null), t === "error" ? 10000 : 5000); };

  const save = useCallback(async (ch, ep) => {
    try { await window.storage.set(STORE_KEY, JSON.stringify({ channels: ch, episodes: ep, lastRefresh: Date.now() })); } catch (e) { dlog(`存储失败: ${e.message}`); }
  }, []);

  // Load with presets
  useEffect(() => {
    (async () => {
      let ch = [], ep = [];
      try {
        const r = await window.storage.get(STORE_KEY);
        if (r?.value) { const d = JSON.parse(r.value); ch = d.channels || []; ep = d.episodes || []; setLastRefresh(d.lastRefresh); }
      } catch {}
      // 加载评分阈值 + 月度学到的 overrides（频道/关键词/嘉宾 bonus）
      // 都由月度 scheduled task 按用户打分 + 批注自动校准
      try {
        const [tr, or] = await Promise.all([
          fetch(`./rating_thresholds.json?bust=${Date.now()}`).catch(() => null),
          fetch(`./learned_overrides.json?bust=${Date.now()}`).catch(() => null),
        ]);
        if (tr && tr.ok) {
          const t = await tr.json(); window.BP_THRESHOLDS = t;
          dlog(`thresholds: 3★≥${t.tier_3_min} 2★≥${t.tier_2_min} (${t.method})`);
        }
        if (or && or.ok) {
          const o = await or.json(); window.BP_OVERRIDES = o;
          const cb = Object.keys(o.channel_bonus || {}).length;
          const kb = Object.keys(o.keyword_bonus || {}).length;
          const gb = Object.keys(o.guest_bonus || {}).length;
          dlog(`overrides: ${cb} 频道 + ${kb} 关键词 + ${gb} 嘉宾 bonus (${o.method})`);
        }
      } catch {}
      // Ensure all preset channels exist (merge by id; user may have added extras)
      for (const pc of PRESET_CHANNELS) {
        if (!ch.find(c => c.id === pc.id)) ch.push(pc);
      }
      // 跨电脑同步：fetch 部署的 episodes_index.json，把未在 PRESET_EPISODES 里的集合当占位 episode 加进来
      // 这样新发现但还没转录的集（如硅谷坐标 6 集）也能立刻显示在主页，标"待转录"
      try {
        const r = await fetch(`./episodes_index.json?bust=${Date.now()}`);
        if (r.ok) {
          const payload = await r.json();
          const list = Array.isArray(payload?.episodes) ? payload.episodes : [];
          for (const ri of list) {
            if (!ri.preset_id) continue;
            if (ep.find(e => e._id === ri.preset_id)) continue;  // 已经有完整 PRESET_EPISODE 数据
            // 创建占位 episode：
            const status = ri.has_summary ? "ready" : ri.has_transcript ? "transcribed_no_summary" : "pending";
            ep.push({
              _id: ri.preset_id,
              _channelId: ri.channel_id ? `preset-${ri.channel_id}` : "",
              _channelName: ri.channel_name || "",
              _isPlaceholder: status !== "ready",
              _status: status,
              _hasTranscript: !!ri.has_transcript,
              _hasSummary: !!ri.has_summary,
              _fetchedAt: Date.now(),
              _isNew: true,
              title: ri.title || "(无标题)",
              date: ri.date || "",
              guests: [], guestBackgrounds: [], topics: [],
              source_url: ri.source_url || "",
              audio_url: ri.audio_url || "",
              duration: ri.duration || 0,
              briefSummary: status === "pending" ? "（待转录…）" : status === "transcribed_no_summary" ? "（已转录，等待总结）" : "",
              detailedSummary: "",
              transcriptSegments: [],
            });
          }
        }
      } catch {}

      // 跨电脑同步：fetch 部署的 channels.json（daemon 推送的最新频道列表 + 默认转录模型设置）
      // 这样在主电脑（daemon 在线）上加的频道、改的模型，副电脑刷新就能看到
      try {
        const r = await fetch(`./channels.json?bust=${Date.now()}`);
        if (r.ok) {
          const remote = await r.json();
          if (Array.isArray(remote)) {
            for (const rc of remote) {
              const pid = rc.podcast_id || "";
              const localId = `preset-${rc.id}`;
              // 本地有就更新（merge 模型设置等），没有就新加
              const existing = ch.find(c => c.id === localId || (c.url && c.url.includes(pid)));
              if (existing) {
                if (rc.default_transcribe_model && existing.default_transcribe_model !== rc.default_transcribe_model) {
                  existing.default_transcribe_model = rc.default_transcribe_model;
                }
              } else if (pid) {
                ch.push({
                  id: localId, name: rc.name, type: rc.type || "podcast",
                  description: "", url: rc.url || `https://www.xiaoyuzhoufm.com/podcast/${pid}`,
                  host: "", updateFrequency: "每周", lastFetched: Date.now(),
                  default_transcribe_model: rc.default_transcribe_model || "whisper",
                });
              }
            }
          }
        }
      } catch {}
      // Ensure preset episodes (update if new version has more data)
      const presetIds = new Set(PRESET_EPISODES.map(e => e._id));
      // Always replace preset episodes with latest embedded version
      ep = [...PRESET_EPISODES, ...ep.filter(e => !presetIds.has(e._id))];
      // 按更新日期降序排列（最新在前）— 无视评分/阅读状态
      ep.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
      chRef.current = ch; epRef.current = ep;
      setChannels(ch); setEpisodes(ep);
      save(ch, ep);
      setLoading(false);
      dlog(`加载完成: ${ch.length}个频道, ${ep.length}条内容`);
      // episodes 已就绪，初始 hash 路由如果是 #/episode/xxx 现在能找到 episode 了
      applyRoute();
    })();
  }, []);

  const doRefresh = useCallback((id) => {
    showToast("内容由后台自动刷新，新内容将在下次部署后显示", "info");
  }, []);

  const addChannel = async (channel) => {
    const newCh = [...chRef.current, channel];
    chRef.current = newCh; setChannels(newCh);
    await save(newCh, epRef.current);
    // 写云端动作队列：bp_channel_actions（主电脑 daemon 会处理：写 channels.json + 触发 pipeline backfill）
    try {
      const actions = JSON.parse(localStorage.getItem("bp_channel_actions") || "[]");
      actions.push({
        id: `addch_${channel.id}_${Date.now()}`, type: "add", status: "pending",
        payload: { name: channel.name, url: channel.url, type: channel.type, default_transcribe_model: channel.default_transcribe_model || "whisper" },
        ts: Date.now(),
      });
      localStorage.setItem("bp_channel_actions", JSON.stringify(actions));
      try { BP_BACKUP.flush(); } catch {}
    } catch {}
    // 本机 daemon 在线就立即同步（秒级），不在线就等云端 worker（30-60s）
    let daemonOk = false;
    try { const probe = await fetch("http://127.0.0.1:9878/status"); daemonOk = probe.ok; } catch { daemonOk = false; }
    if (daemonOk) {
      try {
        await fetch("http://127.0.0.1:9878/channels", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: channel.name, url: channel.url, id: channel.id, type: channel.type, default_transcribe_model: channel.default_transcribe_model || "whisper" }),
        });
        showToast(`✓ 已添加 ${channel.name}，已同步到后台，将自动拉取内容`, "success");
        return;
      } catch {}
    }
    showToast(`✓ ${channel.name} 已加入，主电脑 daemon 上线后会自动开始拉取（约 30-60 秒）`, "info");
  };

  const removeChannel = (id) => {
    const ch = chRef.current.find(c => c.id === id);
    const newCh = chRef.current.filter(c => c.id !== id);
    const newEp = epRef.current.filter(e => e._channelId !== id);
    chRef.current = newCh; epRef.current = newEp;
    setChannels(newCh); setEpisodes(newEp); save(newCh, newEp);
    // 写云端动作队列：bp_channel_actions
    try {
      const url = ch?.url || "";
      const pidMatch = url.match(/podcast\/([a-f0-9]{24})/);
      const actions = JSON.parse(localStorage.getItem("bp_channel_actions") || "[]");
      actions.push({
        id: `delch_${id}_${Date.now()}`, type: "remove", status: "pending",
        payload: { channel_id: id.replace(/^preset-/, ""), podcast_id: pidMatch ? pidMatch[1] : "" },
        ts: Date.now(),
      });
      localStorage.setItem("bp_channel_actions", JSON.stringify(actions));
      try { BP_BACKUP.flush(); } catch {}
    } catch {}
  };

  // 切换频道默认转录模型（whisper / gpt4o）— 任何电脑都能切，自动跨机生效
  // 流程：本机 daemon 在线就直接调（秒级生效）；不在线就写云端动作队列，主电脑 daemon worker 拉去执行
  const changeChannelModel = async (ch, nextModel) => {
    const url = ch.url || "";
    const pidMatch = url.match(/podcast\/([a-f0-9]{24})/);
    const podcastId = pidMatch ? pidMatch[1] : "";
    // 1) 本地 state 立即更新（让 UI 即时反馈）
    const newCh = chRef.current.map(c => c.id === ch.id ? { ...c, default_transcribe_model: nextModel } : c);
    chRef.current = newCh; setChannels(newCh); save(newCh, epRef.current);
    // 2) 写云端动作队列：bp_channel_actions
    //    主电脑 daemon worker 会拉这个去执行
    try {
      const actions = JSON.parse(localStorage.getItem("bp_channel_actions") || "[]");
      const actionId = `chmodel_${podcastId}_${Date.now()}`;
      actions.push({
        id: actionId, type: "set_model", status: "pending",
        payload: { channel_id: ch.id.replace(/^preset-/, ""), podcast_id: podcastId, model: nextModel },
        ts: Date.now(),
      });
      localStorage.setItem("bp_channel_actions", JSON.stringify(actions));
      try { BP_BACKUP.flush(); } catch {}
    } catch {}
    // 3) 本机 daemon 在线？直接秒级调，不必等云端 worker
    let daemonOk = false;
    try {
      const probe = await fetch("http://127.0.0.1:9878/status", { method: "GET" });
      daemonOk = probe.ok;
    } catch { daemonOk = false; }
    if (daemonOk) {
      try {
        const r = await fetch("http://127.0.0.1:9878/channel_model", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: ch.id.replace(/^preset-/, ""), podcast_id: podcastId, model: nextModel }),
        });
        if (r.ok) {
          showToast(`✓ ${ch.name} 默认转录已切到 ${nextModel === "gpt4o" ? "GPT-4o（付费更准）" : "免费 Whisper"}`, "success");
          return;
        }
      } catch {}
    }
    // 4) 本机 daemon 不在线 → 等主电脑 daemon worker 处理
    showToast(`✓ ${ch.name} 模型切换请求已上传，主电脑 daemon 上线后会自动应用（约 30-60 秒）`, "info");
  };

  const addEpisode = (item, synced) => {
    setPendingEpisodes(BP_RATING_DB.getPendingEpisodes());
    if (synced) {
      showToast(`✓ 已加入待处理队列，下次自动转录会处理`, "success");
    } else {
      showToast(`✓ 已记录到本地（守护进程未运行 · 启动后会自动同步）`, "info");
    }
  };

  const requestOpenAIRetranscribe = async (ep) => {
    if (!ep || !ep._id) return;
    const epId = (ep._id || "").replace(/^preset-/, "");
    const segCount = ep.transcriptSegments?.length || 0;
    const audioMin = segCount > 0 ? Math.ceil(ep.transcriptSegments[ep.transcriptSegments.length - 1].start / 60) : 60;
    const costEst = (audioMin * 0.006).toFixed(2);
    const ok = window.confirm(
      `用 OpenAI gpt-4o-transcribe 重新转录这一集？\n\n` +
      `集：${ep.title}\n` +
      `时长：约 ${audioMin} 分钟\n` +
      `预计成本：$${costEst} USD（按 $0.006/min × ${audioMin} min）\n\n` +
      `• 会嵌入名词库（已积累的 ${BP_RATING_DB ? Object.keys(BP_RATING_DB.getAllCorrections()).length : 0} 集更正 + 全局词汇）\n` +
      `• 重转完会自动跑 Opus 4.7 校对 + 重写总结 + 部署\n` +
      `• 整个过程预计 5-15 分钟，期间不影响你使用 dashboard\n\n` +
      `继续？`
    );
    if (!ok) return;
    // 失败时自动重试一次（防 daemon 重启等瞬态问题）
    const tryPost = async () => {
      const r = await fetch("http://127.0.0.1:9878/retranscribe_openai", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ep_id: epId }),
      });
      const data = await r.json().catch(() => ({}));
      return { r, data };
    };
    let attempt = 0;
    while (attempt < 2) {
      try {
        const { r, data } = await tryPost();
        if (r.ok && data.ok) {
          BP_RATING_DB.setRetranscribing(ep._id, { pid: data.pid, log: data.log });
          showToast(`✓ 已加入 GPT-4o 重转队列（PID ${data.pid}）— 完成后自动部署`, "success");
          // 触发 EpisodeCard 重渲染（badge 立即出现）
          setTimeout(() => fu(n => n + 1), 100);
          return;
        }
        showToast(`✗ daemon 拒绝请求：${data.error || `HTTP ${r.status}`}`, "error");
        return;  // 真错（4xx/5xx），不重试
      } catch (e) {
        attempt++;
        if (attempt < 2) {
          // 第一次失败 → 等 2s 重试一次（应付 daemon 短暂重启）
          await new Promise(r => setTimeout(r, 2000));
          continue;
        }
        showToast(`✗ 守护进程不可用（重试 2 次都失败）— 检查 daemon.pyw 是否在跑。错误: ${e.message || e}`, "error");
        return;
      }
    }
  };

  const removePendingEpisode = (epId) => {
    const list = BP_RATING_DB.removePendingEpisode(epId);
    setPendingEpisodes(list);
  };

  if (detailEp) return (
    <>
      <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}} @keyframes spin{to{transform:rotate(360deg)}} *{box-sizing:border-box}`}</style>
      <DetailPage ep={detailEp} onBack={() => navToEpisode(null)} />
    </>
  );

  if (showChannels) return (
    <>
      <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}} @keyframes spin{to{transform:rotate(360deg)}} *{box-sizing:border-box}`}</style>
      <ChannelsPage channels={channels} episodes={episodes} onBack={() => navToChannels(false)}
        onRemove={removeChannel} onRefresh={doRefresh} onAdd={() => setShowAdd(true)} busyId={busyId} />
      {showAdd && <AddModal onClose={() => setShowAdd(false)} onAdded={addChannel} />}
      {toast && <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 2000, animation: "fadeIn .2s ease", fontFamily: mno, fontSize: 12, padding: "10px 20px", borderRadius: 10, maxWidth: "min(500px,90vw)", wordBreak: "break-word", color: toast.t === "error" ? C.red : toast.t === "success" ? C.accent : C.text, background: toast.t === "error" ? "rgba(240,96,96,.1)" : toast.t === "success" ? "rgba(184,240,96,.1)" : C.card, border: `1px solid ${toast.t === "error" ? "rgba(240,96,96,.2)" : toast.t === "success" ? "rgba(184,240,96,.2)" : C.border}`, boxShadow: "0 8px 32px rgba(0,0,0,.4)" }}>{toast.m}</div>}
    </>
  );

  const transcribedCount = episodes.filter(e => e.transcriptSegments?.length > 0).length;
  const totalCount = episodes.length;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text }}>
      <style>{`
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes pulseRing{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:0;transform:scale(2.2)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:${C.border};border-radius:3px}
        input::placeholder{color:${C.textDim}}
      `}</style>

      <header style={{ borderBottom: `1px solid ${C.border}`, padding: "8px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 50, background: "rgba(255,255,255,.92)", backdropFilter: "blur(12px)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <h1 style={{ fontFamily: srf, fontSize: 18, fontWeight: 300, color: C.text, margin: 0 }}>Blog<span style={{ fontWeight: 600 }}>Pulse</span></h1>
          {episodes.filter(e => e._isNew).length > 0 && <span style={{ fontFamily: mno, fontSize: 9, color: C.bg, background: C.accent, borderRadius: 8, padding: "0px 7px", fontWeight: 500 }}>{episodes.filter(e => e._isNew).length} 新</span>}
          {transcribedCount > 0 && <span style={{ fontFamily: mno, fontSize: 9, color: C.accentDark }}>{transcribedCount}/{totalCount} 已转录</span>}
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <button onClick={() => setShowBackup(true)} title="数据备份与恢复 — 评分/批注/已读" style={{ fontFamily: mno, fontSize: 10, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 10px", cursor: "pointer" }}>💾 备份</button>
          <button onClick={() => navToChannels(true)} title="查看所有追踪频道" style={{ fontFamily: mno, fontSize: 10, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 12px", cursor: "pointer" }}>📡 频道 · {channels.length}</button>
          <button onClick={() => setShowAddEpisode(true)} title="添加单集（不 track 整个频道）" style={{ fontFamily: mno, fontSize: 10, color: C.accent, background: C.bg, border: `1px solid ${C.accent}`, borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontWeight: 500, position: "relative" }}>
            + 单集
            {pendingEpisodes.filter(p => p.status === "pending").length > 0 && (
              <span style={{ position: "absolute", top: -4, right: -4, fontSize: 8, color: C.bg, background: "#e08e3a", borderRadius: 8, padding: "1px 5px", fontWeight: 600, lineHeight: 1.4 }}>{pendingEpisodes.filter(p => p.status === "pending").length}</span>
            )}
          </button>
          <button onClick={() => setShowAdd(true)} title="追踪整个频道（自动获取所有更新）" style={{ fontFamily: mno, fontSize: 10, color: C.bg, background: C.accent, border: "none", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontWeight: 500 }}>+ 频道</button>
        </div>
      </header>

      <main style={{ padding: "12px 24px", maxWidth: 960, margin: "0 auto", minHeight: "50vh" }}>
        {/* 待处理单集队列 — 用户主动请求的、还没被 pipeline 处理的 episode */}
        {pendingEpisodes.filter(p => p.status === "pending").length > 0 && (
          <div style={{ marginBottom: 14, background: "#fef9ed", border: `1px solid #f0d294`, borderRadius: 8, padding: "10px 14px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <span style={{ fontFamily: mno, fontSize: 10, color: "#9a6e1d", fontWeight: 600 }}>⏳ 待处理单集 · {pendingEpisodes.filter(p => p.status === "pending").length}</span>
              <span style={{ fontFamily: mno, fontSize: 9, color: "#a4894c" }}>下次自动转录会处理（也可以发链接给我手动加速）</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {pendingEpisodes.filter(p => p.status === "pending").slice(0, 5).map(p => (
                <div key={p.episode_id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
                  <a href={p.url} target="_blank" rel="noreferrer" style={{ fontFamily: mno, fontSize: 11, color: "#7a4f0f", textDecoration: "none", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {p.title || `episode ${p.episode_id.slice(0, 12)}…`}
                  </a>
                  <span style={{ fontFamily: mno, fontSize: 9, color: "#a4894c", flexShrink: 0 }}>{new Date(p.requested_at).toLocaleDateString()}</span>
                  <button onClick={() => removePendingEpisode(p.episode_id)} title="取消请求" style={{ fontFamily: mno, fontSize: 11, color: "#a4894c", background: "none", border: "none", cursor: "pointer", padding: "0 4px" }}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}
        {/* 频道筛选 chip — 默认"全部"，点单个频道则只看该频道；只在追踪了多于 1 个频道时显示 */}
        {(() => {
          if (loading || episodes.length === 0) return null;
          // 统计每频道的剧集数
          const counts = new Map();
          for (const e of episodes) {
            const id = e._channelId;
            if (id) counts.set(id, (counts.get(id) || 0) + 1);
          }
          // 只显示有剧集的频道，按数量倒序
          const visibleChannels = channels
            .filter(c => counts.get(c.id) > 0)
            .map(c => ({ ...c, count: counts.get(c.id) }))
            .sort((a, b) => b.count - a.count);
          if (visibleChannels.length < 2) return null; // 只有 1 个频道时筛选没意义
          const chipStyle = (active) => ({
            fontFamily: mno, fontSize: 10,
            color: active ? C.bg : C.textSec,
            background: active ? C.accent : C.surface,
            border: `1px solid ${active ? C.accent : C.border}`,
            borderRadius: 14,
            padding: "4px 12px",
            cursor: "pointer",
            fontWeight: active ? 600 : 400,
            whiteSpace: "nowrap",
            transition: "all .12s",
          });
          return (
            <div style={{ marginBottom: 12, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontFamily: mno, fontSize: 10, color: C.textDim, marginRight: 2 }}>筛选频道</span>
              <button onClick={() => setSelectedChannelId(null)} style={chipStyle(selectedChannelId === null)}>
                全部 · {episodes.length}
              </button>
              {visibleChannels.map(c => (
                <button key={c.id} onClick={() => setSelectedChannelId(c.id)} style={chipStyle(selectedChannelId === c.id)} title={c.name}>
                  {c.name} · {c.count}
                </button>
              ))}
            </div>
          );
        })()}
        {(() => {
          if (loading) return <div style={{ textAlign: "center", padding: "40px 0" }}><Spinner size={20} /></div>;
          if (episodes.length === 0) return <div style={{ textAlign: "center", padding: "40px 20px" }}><p style={{ fontFamily: mno, fontSize: 11, color: C.textDim }}>暂无内容</p></div>;
          const filtered = selectedChannelId ? episodes.filter(e => e._channelId === selectedChannelId) : episodes;
          if (filtered.length === 0) {
            return <div style={{ textAlign: "center", padding: "40px 20px" }}>
              <p style={{ fontFamily: mno, fontSize: 11, color: C.textDim }}>这个频道还没有内容</p>
              <button onClick={() => setSelectedChannelId(null)} style={{ fontFamily: mno, fontSize: 10, color: C.accent, background: C.bg, border: `1px solid ${C.accent}`, borderRadius: 6, padding: "4px 12px", cursor: "pointer", marginTop: 8 }}>查看全部</button>
            </div>;
          }
          return <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {filtered.map(ep => <EpisodeCard key={ep._id} ep={ep} onOpen={navToEpisode} onRetranscribeOpenAI={requestOpenAIRetranscribe} />)}
          </div>;
        })()}
      </main>

      {showAdd && <AddModal onClose={() => setShowAdd(false)} onAdded={addChannel} />}
      {showAddEpisode && <AddEpisodeModal onClose={() => setShowAddEpisode(false)} onAdded={addEpisode} />}
      {showBackup && <DataBackupModal onClose={() => setShowBackup(false)} />}

      <button onClick={() => { setShowDebug(!showDebug); fu(n => n + 1); }} style={{ position: "fixed", bottom: 12, right: 12, zIndex: 2000, fontFamily: mno, fontSize: 9, color: C.textDim, background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, padding: "4px 8px", cursor: "pointer", opacity: .5 }}>{showDebug ? "隐藏" : "调试"}</button>
      {showDebug && <div style={{ position: "fixed", bottom: 36, right: 12, zIndex: 1999, width: 400, maxHeight: 280, overflowY: "auto", background: "rgba(255,255,255,.97)", border: `1px solid ${C.border}`, borderRadius: 10, padding: 12 }}>
        {logs.map((l, i) => <div key={i} style={{ fontFamily: mno, fontSize: 10, color: l.includes("✗") ? C.red : l.includes("✓ ") ? C.accent : C.textSec, padding: "2px 0", borderBottom: `1px solid ${C.border}`, wordBreak: "break-all", lineHeight: 1.4 }}>{l}</div>)}
      </div>}

      {toast && <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 2000, animation: "fadeIn .2s ease", fontFamily: mno, fontSize: 12, padding: "10px 20px", borderRadius: 10, maxWidth: "min(500px,90vw)", wordBreak: "break-word", color: toast.t === "error" ? C.red : toast.t === "success" ? C.accent : C.text, background: toast.t === "error" ? "rgba(240,96,96,.1)" : toast.t === "success" ? "rgba(184,240,96,.1)" : C.card, border: `1px solid ${toast.t === "error" ? "rgba(240,96,96,.2)" : toast.t === "success" ? "rgba(184,240,96,.2)" : C.border}`, boxShadow: "0 8px 32px rgba(0,0,0,.4)" }}>{toast.m}</div>}

      {/* 自动检测：浏览器无用户数据但守护进程有备份 → 提示恢复 */}
      {restoreOffer && (
        <div style={{ position: "fixed", top: 60, left: "50%", transform: "translateX(-50%)", zIndex: 2100, width: "min(580px,94vw)", background: "#fef9ed", border: "1px solid #f0d294", borderRadius: 10, padding: "14px 18px", boxShadow: "0 8px 32px rgba(0,0,0,.18)", animation: "fadeIn .2s ease" }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
            <span style={{ fontSize: 22 }}>💾</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: srf, fontSize: 14, fontWeight: 600, color: "#7a4f0f", marginBottom: 4 }}>检测到可恢复的备份</div>
              <div style={{ fontFamily: mno, fontSize: 11, color: "#9a6e1d", lineHeight: 1.6, marginBottom: 8 }}>
                这台浏览器没有评分/已读/批注数据，但本地守护进程文件夹里有一份备份（{new Date(restoreOffer.payload.ts).toLocaleString()}）。要不要恢复？
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={acceptRestore} style={{ fontFamily: mno, fontSize: 11, color: C.bg, background: C.accent, border: "none", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontWeight: 500 }}>恢复</button>
                <button onClick={() => { setShowBackup(true); setRestoreOffer(null); }} style={{ fontFamily: mno, fontSize: 11, color: "#7a4f0f", background: "#fff", border: "1px solid #f0d294", borderRadius: 6, padding: "6px 14px", cursor: "pointer" }}>查看详情</button>
                <button onClick={dismissRestore} style={{ fontFamily: mno, fontSize: 11, color: "#a4894c", background: "transparent", border: "none", padding: "6px 10px", cursor: "pointer" }}>跳过</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(BlogPulse));
</script>
</body>
</html>
