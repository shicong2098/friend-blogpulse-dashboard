function timeAgo(ts) {
  if (!ts) return "从未";
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return "刚刚"; if (m < 60) return `${m}分钟前`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}小时前`; return `${Math.floor(h / 24)}天前`;
}
function fmtTime(sec) {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
  return h > 0 ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}` : `${m}:${String(s).padStart(2,"0")}`;
}

// ─── 自动分类用户更正（前端轻量规则 — 是否专有名词）───
// 返回 {type, label, isProperNoun}
function bpClassifyCorrection(corrected) {
  const c = (corrected || "").trim();
  if (!c) return { type: "unknown", label: "未知", isProperNoun: false };
  if (/^[A-Z]{2,8}$/.test(c)) return { type: "acronym", label: "缩写", isProperNoun: true };
  if (/^[A-Z][a-zA-Z][a-zA-Z0-9\-]{1,15}$/.test(c)) return { type: "company_or_product", label: "公司/产品", isProperNoun: true };
  if (/^[A-Z][a-z]+(\s[A-Z][a-z]+)+$/.test(c)) return { type: "person_en", label: "英文人名", isProperNoun: true };
  // 中文人名：2-4 字 + 常见姓氏首字
  const surnames = "张李王赵陈刘黄周吴徐孙马朱胡郭何高林郑梁谢罗宋唐许韩冯邓曹彭曾肖田董袁潘于蒋蔡余杜叶程苏魏吕丁任沈姚卢姜崔钟谭陆汪范金石廖贾夏韦付方白邹孟熊秦邱江尹薛阎段雷侯龙史陶黎贺顾毛郝龚邵万钱严覃武戴莫孔向汤洪卫";
  if (/^[一-龥]{2,4}$/.test(c) && surnames.includes(c[0])) return { type: "person_zh", label: "中文人名", isProperNoun: true };
  if (/^[a-z][a-zA-Z\-]{2,30}$/.test(c)) return { type: "ai_term", label: "技术术语", isProperNoun: true };
  if (/^[一-龥]{2,8}$/.test(c)) return { type: "chinese_term", label: "中文术语", isProperNoun: true };
  if (c.length > 20) return { type: "phrase", label: "改写（不入名词库）", isProperNoun: false };
  return { type: "unknown", label: "未识别（不入名词库）", isProperNoun: false };
}

// 给一段文本应用 corrections 列表（按 original 长度倒序，避免短词覆盖长词）
function bpApplyCorrections(text, corrections) {
  if (!text || !corrections || !corrections.length) return text;
  let out = String(text);
  const sorted = [...corrections].sort((a, b) => (b.original || "").length - (a.original || "").length);
  for (const c of sorted) {
    if (!c.original || !c.corrected || c.original === c.corrected) continue;
    // 全局替换；JS 没有简单的 replaceAll-with-string-not-regex，需要 split+join
    out = out.split(c.original).join(c.corrected);
  }
  return out;
}

// 在原字符串里数 occurrences（用于 modal 预览"还有 X 处"）
function bpCountOccurrences(text, needle) {
  if (!text || !needle) return 0;
  return text.split(needle).length - 1;
}

// 给一段被选中的文字，在原文里找到它，并按 *...* 边界拆分为 atoms
// 返回 [{italic: bool, text: str}, ...] — 让批注卡片可以按原文样式渲染
// 不命中（找不到）→ 当作整段非斜体
function bpSplitByItalicFromSource(needle, source) {
  if (!needle || !source) return [{ italic: false, text: needle || "" }];
  const trimmedNeedle = needle.replace(/\*/g, "");  // 已存的批注 text 已经 strip 过 *
  if (!trimmedNeedle) return [{ italic: false, text: "" }];
  // 在 source 里标记哪些字符在 *...* 里（按对配对）
  const inItalic = new Array(source.length).fill(false);
  let openAt = -1;
  for (let i = 0; i < source.length; i++) {
    if (source[i] === "*") {
      if (openAt < 0) openAt = i;
      else {
        for (let j = openAt + 1; j < i; j++) inItalic[j] = true;
        openAt = -1;
      }
    }
  }
  // 在 source 里查找 needle（去掉 * 之后比对）
  // source 含 *，需要先生成无 * 版本 + 映射
  const plainSource = [];
  const plainToOrig = [];  // plainSource[k] = source[plainToOrig[k]]
  for (let i = 0; i < source.length; i++) {
    if (source[i] !== "*") {
      plainSource.push(source[i]);
      plainToOrig.push(i);
    }
  }
  const plainStr = plainSource.join("");
  const idx = plainStr.indexOf(trimmedNeedle);
  if (idx < 0) return [{ italic: false, text: trimmedNeedle }];
  // 按需要的每个字符在原文里对应的位置查 inItalic
  const atoms = [];
  let curItalic = inItalic[plainToOrig[idx]];
  let buf = "";
  for (let k = idx; k < idx + trimmedNeedle.length; k++) {
    const origPos = plainToOrig[k];
    const it = inItalic[origPos];
    if (it === curItalic) {
      buf += plainStr[k];
    } else {
      if (buf) atoms.push({ italic: curItalic, text: buf });
      curItalic = it;
      buf = plainStr[k];
    }
  }
  if (buf) atoms.push({ italic: curItalic, text: buf });
  return atoms;
}

// ─── Auto-backup daemon mirror ───
// 每次 BP_RATING_DB._set 都会 debounce 触发：
//   1) 写一份滚动 snapshot 到 localStorage 的 bp_snap_history（保最近 20 份）
//   2) POST 一份完整快照到本地守护进程 /backup（如果在线 → 每小时/每天分文件留档）
// 这样 localStorage 被清掉时，本地 daemon 的 user_data_backups 文件夹仍有完整历史
const BP_BACKUP = {
  _timer: null,
  _snapHistoryKey: "bp_snap_history",
  _snapMax: 20, // 本地最多保留多少份滚动 snapshot
  collectAll() {
    // 收集所有 bp_ 前缀的 localStorage（user data）— 不包括 bp-data-v* 应用状态
    const out = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith("bp_") && k !== "bp_snap_history") {
        out[k] = localStorage.getItem(k);
      }
    }
    return out;
  },
  schedule() {
    if (this._timer) clearTimeout(this._timer);
    this._timer = setTimeout(() => this.flush(), 1500);
  },
  flush() {
    const snapshot = this.collectAll();
    const ts = Date.now();
    // 1) 滚动本地 snapshot
    try {
      const hist = JSON.parse(localStorage.getItem(this._snapHistoryKey) || "[]");
      hist.unshift({ ts, data: snapshot });
      while (hist.length > this._snapMax) hist.pop();
      localStorage.setItem(this._snapHistoryKey, JSON.stringify(hist));
    } catch (e) { /* localStorage 满了就跳过本地 snapshot */ }
    // 2) 发送到 daemon (本机) + Cloudflare /api/backup (跨机持久化、移动端可用)
    const payload = JSON.stringify({ data: snapshot, ts });
    try {
      fetch("http://127.0.0.1:9878/backup", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: payload,
      }).catch(() => {});
    } catch {}
    try {
      fetch("/api/backup", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: payload,
      }).catch(() => {});
    } catch {}
  },
  getLocalHistory() {
    try { return JSON.parse(localStorage.getItem(this._snapHistoryKey) || "[]"); }
    catch { return []; }
  },
};

const BP_RATING_DB = {
  _get(k, def) { try { return JSON.parse(localStorage.getItem("bp_" + k)) || def; } catch(e) { return def; } },
  _set(k, v) { try { localStorage.setItem("bp_" + k, JSON.stringify(v)); BP_BACKUP.schedule(); } catch(e) {} },
  getUserRatings() { return this._get("user_ratings", {}); },
  setUserRating(id, r) { const d = this.getUserRatings(); if (r > 0) d[id] = r; else delete d[id]; this._set("user_ratings", d); return d; },
  getLearnedWeights() { return this._get("learned_weights", {}); },
  saveLearnedWeights(w) { this._set("learned_weights", w); },
  getRatingCount() { return Object.keys(this.getUserRatings()).length; },
  // 已读过 — user-only marker
  getReads() { return this._get("reads", {}); },
  isRead(id) { return !!this.getReads()[id]; },
  toggleRead(id) {
    const d = this.getReads();
    if (d[id]) { delete d[id]; }
    else { d[id] = { readAt: Date.now() }; }
    this._set("reads", d);
    return !!d[id];
  },
  // 批注 — per-episode list of {id, text, note, created, updated}
  getAnnotations(epId) { const all = this._get("annotations", {}); return all[epId] || []; },
  saveAnnotations(epId, list) {
    const all = this._get("annotations", {});
    if (list && list.length) all[epId] = list; else delete all[epId];
    this._set("annotations", all);
  },
  getAnnotationCharCount(epId) {
    return this.getAnnotations(epId).reduce((sum, a) => sum + (a.note || "").length, 0);
  },
  // 单集请求队列 — 用户主动请求处理某一集（不 track 整个频道）
  // 每条 { episode_id, url, title?, note?, status: "pending"|"done"|"failed", requested_at }
  getPendingEpisodes() { return this._get("pending_episodes", []); },
  savePendingEpisodes(list) { this._set("pending_episodes", list || []); },
  addPendingEpisode(item) {
    const list = this.getPendingEpisodes();
    // 去重：同一个 episode_id 只保留最新
    const filtered = list.filter(p => p.episode_id !== item.episode_id);
    filtered.unshift(item);
    this.savePendingEpisodes(filtered);
    return filtered;
  },
  removePendingEpisode(episode_id) {
    const list = this.getPendingEpisodes().filter(p => p.episode_id !== episode_id);
    this.savePendingEpisodes(list);
    return list;
  },
  // ─── 用户更正（per-episode 字符串替换 + 全局名词库种子）───
  // 数据结构：{ ep_id: [ {original, corrected, type, ts, applied_count}, ... ] }
  getCorrections(epId) {
    const all = this._get("corrections", {});
    return all[epId] || [];
  },
  addCorrection(epId, item) {
    const all = this._get("corrections", {});
    if (!all[epId]) all[epId] = [];
    // 去重：同一个 (original,corrected) 对只保留最新
    all[epId] = all[epId].filter(c => !(c.original === item.original && c.corrected === item.corrected));
    all[epId].unshift({ ...item, ts: Date.now() });
    this._set("corrections", all);
    return all[epId];
  },
  getAllCorrections() {
    return this._get("corrections", {});
  },
  // ─── 章节"更详细总结"展开 ───
  // 数据结构: { ep_id: { chapter_key: { text, ts, model } } }
  getExpansions(epId) {
    const all = this._get("expansions", {});
    return all[epId] || {};
  },
  setExpansion(epId, chapterKey, info) {
    const all = this._get("expansions", {});
    if (!all[epId]) all[epId] = {};
    all[epId][chapterKey] = { ts: Date.now(), ...info };
    this._set("expansions", all);
    return all[epId];
  },
  removeExpansion(epId, chapterKey) {
    const all = this._get("expansions", {});
    if (all[epId]) {
      delete all[epId][chapterKey];
      if (!Object.keys(all[epId]).length) delete all[epId];
      this._set("expansions", all);
    }
  },
  // ─── 跨电脑 "+ 更详细总结" 任务队列 ───
  // 副电脑（无 daemon）点击时写入；主电脑 daemon worker 拉取处理
  // 数据结构: { ep_id: { chapter_key: { start_sec, end_sec, current_text, requested_at, status?: 'pending'|'processing'|'done'|'error' } } }
  getExpandPending(epId) {
    const all = this._get("expand_pending", {});
    return all[epId] || {};
  },
  setExpandPending(epId, chapterKey, info) {
    const all = this._get("expand_pending", {});
    if (!all[epId]) all[epId] = {};
    all[epId][chapterKey] = { requested_at: Date.now(), status: "pending", ...info };
    this._set("expand_pending", all);
    return all[epId];
  },
  removeExpandPending(epId, chapterKey) {
    const all = this._get("expand_pending", {});
    if (all[epId]) {
      delete all[epId][chapterKey];
      if (!Object.keys(all[epId]).length) delete all[epId];
      this._set("expand_pending", all);
    }
  },
  // ─── GPT-4o 重转录中状态 ───
  // { ep_id: { ts, pid } }，30 分钟自动过期
  getRetranscribing(epId) {
    const all = this._get("retranscribing", {});
    const entry = all[epId];
    if (!entry) return null;
    if (Date.now() - entry.ts > 30 * 60 * 1000) {
      delete all[epId];
      this._set("retranscribing", all);
      return null;
    }
    return entry;
  },
  setRetranscribing(epId, info) {
    const all = this._get("retranscribing", {});
    all[epId] = { ts: Date.now(), ...info };
    this._set("retranscribing", all);
  },
  clearRetranscribing(epId) {
    const all = this._get("retranscribing", {});
    delete all[epId];
    this._set("retranscribing", all);
  },
  // ─── 备份/恢复 ───
  exportAll() {
    const out = BP_BACKUP.collectAll();
    return { ts: Date.now(), iso: new Date().toISOString(), data: out };
  },
  importAll(payload, mode = "merge") {
    // mode: "merge" → 仅在本地无该 key 时写入（永远不覆盖现有）
    //       "replace" → 全部覆盖
    //       "smart" → 评分/已读/批注 智能合并（按 epId 取并集）
    if (!payload || !payload.data) return { written: 0, skipped: 0 };
    let written = 0, skipped = 0;
    if (mode === "smart") {
      // smart merge：对常见复合 key 做按子键合并
      const ratings = JSON.parse(payload.data.bp_user_ratings || "null") || {};
      const reads = JSON.parse(payload.data.bp_reads || "null") || {};
      const annotations = JSON.parse(payload.data.bp_annotations || "null") || {};
      const pending = JSON.parse(payload.data.bp_pending_episodes || "null") || [];
      const learned = JSON.parse(payload.data.bp_learned_weights || "null") || {};
      const correctionsBak = JSON.parse(payload.data.bp_corrections || "null") || {};

      // 评分：合并；备份的优先（如果用户最近重打分了，那条更新；这里以备份为基础再叠加现有）
      const curR = this.getUserRatings();
      const mergedR = { ...ratings, ...curR };
      this._set("user_ratings", mergedR);
      // 已读：并集
      const curRd = this.getReads();
      const mergedRd = { ...reads, ...curRd };
      this._set("reads", mergedRd);
      // 批注：按 epId 合并（每集的 list 取并集，按 ann.id 去重）
      const curA = this._get("annotations", {});
      const mergedA = { ...annotations };
      for (const [epId, list] of Object.entries(curA)) {
        const fromBackup = mergedA[epId] || [];
        const seen = new Set(fromBackup.map(a => a.id));
        const extra = list.filter(a => !seen.has(a.id));
        mergedA[epId] = [...fromBackup, ...extra];
      }
      this._set("annotations", mergedA);
      // 待处理单集：按 episode_id 并集
      const curP = this.getPendingEpisodes();
      const seenP = new Set(pending.map(p => p.episode_id));
      const mergedP = [...pending, ...curP.filter(p => !seenP.has(p.episode_id))];
      this._set("pending_episodes", mergedP);
      // learned：直接合并（可能丢一些权重精度但无伤大雅）
      const curL = this.getLearnedWeights();
      this._set("learned_weights", { ...learned, ...curL });
      // 用户更正：按 epId 合并，每集 list 按 (original→corrected) 去重
      const curC = this._get("corrections", {});
      const mergedC = { ...correctionsBak };
      for (const [epId, list] of Object.entries(curC)) {
        const fromBackup = mergedC[epId] || [];
        const seenC = new Set(fromBackup.map(c => `${c.original}→${c.corrected}`));
        const extra = list.filter(c => !seenC.has(`${c.original}→${c.corrected}`));
        mergedC[epId] = [...fromBackup, ...extra];
      }
      this._set("corrections", mergedC);
      written = 6;
      return { written, skipped };
    }
    // merge / replace
    for (const [k, v] of Object.entries(payload.data)) {
      if (!k.startsWith("bp_") || k === "bp_snap_history") continue;
      if (mode === "merge" && localStorage.getItem(k)) { skipped++; continue; }
      try { localStorage.setItem(k, v); written++; } catch {}
    }
    return { written, skipped };
  },
  // 诊断：当前每个 key 的 size 与简要内容统计
  diagnose() {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      const v = localStorage.getItem(k) || "";
      const size = new Blob([v]).size;
      let summary = "";
      try {
        const parsed = JSON.parse(v);
        if (Array.isArray(parsed)) summary = `array · ${parsed.length} 条`;
        else if (parsed && typeof parsed === "object") summary = `${Object.keys(parsed).length} 键`;
        else summary = String(parsed).slice(0, 30);
      } catch { summary = v.slice(0, 30); }
      out.push({ key: k, size, summary });
    }
    return out.sort((a, b) => b.size - a.size);
  },
};
function bpExtractFeatures(ep) {
  const text = [ep.title||"", ep._channelName||"", (ep.guests||[]).join(" "), (ep.guestBackgrounds||[]).join(" "), (ep.keyTopics||[]).join(" "), ep.briefSummary||""].join(" ").toLowerCase();
  const seen = new Set();
  const features = [];
  for (const [cat, {words, base}] of Object.entries(BP_KEYWORDS)) {
    for (const w of words) { if (text.includes(w) && !seen.has(w)) { seen.add(w); features.push({cat, word: w, base}); } }
  }
  return { text, features };
}
function bpRateEpisode(ep) {
  const learned = BP_RATING_DB.getLearnedWeights();
  // 月度学到的 overrides（频道/关键词/嘉宾 bonus）— 由 auto_tune_weights.py 每月 1 号校准
  const overrides = window.BP_OVERRIDES || {};
  const chBonus = overrides.channel_bonus || {};
  const kwBonus = overrides.keyword_bonus || {};
  const gBonus = overrides.guest_bonus || {};

  let score = 0;
  // 1. 频道权重 + 月度频道偏好
  score += BP_CHANNEL_WEIGHT[ep._channelName] || 0;
  score += chBonus[ep._channelName] || 0;
  // 2. 关键词命中 + 月度关键词偏好
  const { features } = bpExtractFeatures(ep);
  for (const f of features) {
    score += Math.max(0, f.base + (learned[f.word] || 0));
    score += kwBonus[f.word] || 0;
  }
  // 3. 嘉宾 tier — 也从 title/summary 里捕捉嘉宾名（很多集 guests 字段为空）
  const guestText = [(ep.guests||[]).join(" "), (ep.guestBackgrounds||[]).join(" "), ep.title||"", ep.briefSummary||""].join(" ").toLowerCase();
  if (BP_GUEST_TIER.top.some(g => guestText.includes(g))) score += 3;
  else if (BP_GUEST_TIER.high.some(g => guestText.includes(g))) score += 2;
  // 月度嘉宾 bonus（明确出现在 guests 数组里全额，标题里出现半额）
  for (const g of (ep.guests || [])) score += gBonus[g] || 0;
  for (const [g, b] of Object.entries(gBonus)) {
    if (g && guestText.includes(g.toLowerCase()) && !(ep.guests||[]).includes(g)) score += b * 0.5;
  }

  // 阈值从 ./rating_thresholds.json 动态读取（兜底默认 18/7）
  const t3 = (window.BP_THRESHOLDS && window.BP_THRESHOLDS.tier_3_min) || 18;
  const t2 = (window.BP_THRESHOLDS && window.BP_THRESHOLDS.tier_2_min) || 7;
  if (score >= t3) return 3;
  if (score >= t2) return 2;
  return 1;
}
// 直接评分（显式反馈）— step=0.25/命中词
function bpLearnFromRating(ep, userScore) {
  const aiScore = bpRateEpisode(ep);
  const delta = userScore - aiScore;
  if (delta === 0) return;
  const { features } = bpExtractFeatures(ep);
  if (!features.length) return;
  const learned = BP_RATING_DB.getLearnedWeights();
  const step = delta * 0.25 / features.length;
  for (const f of features) learned[f.word] = Math.max(-2, Math.min(2, (learned[f.word] || 0) + step));
  BP_RATING_DB.saveLearnedWeights(learned);
}
// 隐式反馈（已读/批注）— 把对命中词的兴趣做小幅正向调整
// strength: 已读=0.3；批注按字数缩放（50字≈0.5，200字≈1.0，封顶1.5）
function bpImplicitBoost(ep, strength) {
  const { features } = bpExtractFeatures(ep);
  if (!features.length) return;
  const learned = BP_RATING_DB.getLearnedWeights();
  const step = Math.min(1.5, strength) * 0.08 / features.length;
  for (const f of features) learned[f.word] = Math.max(-2, Math.min(2, (learned[f.word] || 0) + step));
  BP_RATING_DB.saveLearnedWeights(learned);
}
function bpAnnotationBoostStrength(charCount) {
  // 0 字=0；50 字≈0.5；200 字≈1.0；封顶 1.5
  return Math.min(1.5, charCount / 150);
}
function RatingStars({ ep, onChange }) {
  const [userRating, setUserRating] = useState(BP_RATING_DB.getUserRatings()[ep._id] || 0);
  const aiRating = bpRateEpisode(ep);
  const handleClick = (i, e) => {
    e.stopPropagation();
    const newR = userRating === i ? 0 : i;
    setUserRating(newR);
    BP_RATING_DB.setUserRating(ep._id, newR);
    if (newR > 0) bpLearnFromRating(ep, newR);
    onChange?.(newR);
  };
  const aiStars = [1,2,3].map(i => <span key={i} style={{color: i <= aiRating ? "#f59e0b" : "#ddd"}}>★</span>);
  const userStars = [1,2,3].map(i => (
    <span key={i} onClick={e => handleClick(i, e)}
      style={{color: userRating && i <= userRating ? "#8b5cf6" : "#d4d4d4", cursor: "pointer", transition: "color .1s", padding: "0 1px"}}>★</span>
  ));
  return (
    <div style={{display: "flex", gap: 6, alignItems: "center", flexShrink: 0}}>
      <span style={{display: "flex", alignItems: "center", gap: 3}}>
        <span style={{fontFamily: mno, fontSize: 8, color: C.textDim}}>AI</span>
        <span style={{fontSize: 11, letterSpacing: 0.5, lineHeight: 1}}>{aiStars}</span>
      </span>
      <span style={{display: "flex", alignItems: "center", gap: 3}}>
        <span style={{fontFamily: mno, fontSize: 8, color: C.textDim}}>我</span>
        <span style={{fontSize: 11, letterSpacing: 0.5, lineHeight: 1}}>{userStars}</span>
      </span>
    </div>
  );
}

                    {label}
                    <button onClick={(e) => { e.stopPropagation(); BP_RATING_DB.clearRetranscribing(ep._id); _tick(n => n + 1); }}

                      style={{ fontFamily: mno, fontSize: 9, color, background: "transparent", border: "none", cursor: "pointer", padding: 0, lineHeight: 1, opacity: 0.6 }}>✕</button>

                      style={{ fontFamily: mno, fontSize: 9, color: "#7c3aed", background: "rgba(124,58,237,.06)", padding: "0px 5px", borderRadius: 3, border: "1px solid rgba(124,58,237,.25)", cursor: "pointer" }}>🔁 GPT-4o 重转</button>

                      style={{ fontFamily: mno, fontSize: 9, color: "#b8860b", background: "rgba(184,134,11,.08)", padding: "0px 5px", borderRadius: 3, border: "1px solid rgba(184,134,11,.30)", cursor: "pointer", fontWeight: 600 }}>💰 付费转录</button>
                  </>

            })()}
            {isRead && <span style={{ fontFamily: mno, fontSize: 9, color: C.textRead, background: "#e7e8ec", padding: "0px 5px", borderRadius: 3 }}>已读过</span>}

// ─── Transcript Viewer ───
function TranscriptViewer({ segments, audioUrl, corrections, onCorrect, findContext }) {
  const [playing, setPlaying] = useState(null);
  const [search, setSearch] = useState("");
  const [pendingSel, setPendingSel] = useState(null); // {text, top, left, right} 用于显示 ✎ 更正按钮
  const [highlightIdx, setHighlightIdx] = useState(null);  // 查找原文短暂高亮的 segment
  const containerRef = useRef(null);
  const audioRef = useRef(null);

  // 应用 corrections 到每个 segment 的 text
  const correctedSegs = useMemo(() => {
    if (!corrections || !corrections.length) return segments;
    return segments.map(s => ({ ...s, text: bpApplyCorrections(s.text, corrections) }));
  }, [segments, corrections]);

  const filteredSegs = search.trim()
    ? correctedSegs.filter(s => s.text.toLowerCase().includes(search.toLowerCase()))
    : correctedSegs;

  const playFrom = (startSec) => {
    if (!audioUrl) return;
    if (!audioRef.current) {
      audioRef.current = new Audio(audioUrl);
      audioRef.current.addEventListener("ended", () => setPlaying(null));
    }
    audioRef.current.currentTime = startSec;
    audioRef.current.play();
    setPlaying(startSec);
  };

  const stopAudio = () => {
    if (audioRef.current) { audioRef.current.pause(); }
    setPlaying(null);
  };

  useEffect(() => { return () => { if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; } }; }, []);

  // 🔍 查找原文：findContext 变化时，搜索 segments + 滚动 + 短暂高亮
  useEffect(() => {
    if (!findContext?.text || !correctedSegs.length) return;
    const needle = findContext.text.replace(/\*/g, "").trim();
    if (!needle) return;
    // 1) 精确匹配（整段或子串）
    let foundIdx = correctedSegs.findIndex(s => (s.text || "").includes(needle));
    // 2) 短前缀匹配（嘉宾原话可能被 Opus 微调过）
    if (foundIdx < 0 && needle.length >= 6) {
      const probes = [needle.slice(0, 16), needle.slice(0, 10), needle.slice(0, 6)].filter(p => p.length >= 4);
      for (const probe of probes) {
        foundIdx = correctedSegs.findIndex(s => (s.text || "").includes(probe));
        if (foundIdx >= 0) break;
      }
    }
    if (foundIdx < 0) {
      setHighlightIdx({ idx: -1, msg: "未找到对应原文段落（划词内容可能是 AI 重写而非逐字摘录）" });
      setTimeout(() => setHighlightIdx(prev => prev?.msg ? null : prev), 4000);
      return;
    }
    // 滚到目标 + 高亮 4 秒
    setHighlightIdx({ idx: foundIdx });
    setTimeout(() => {
      const el = containerRef.current?.querySelector(`[data-seg-idx="${foundIdx}"]`);
      el?.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 50);
    const t = setTimeout(() => setHighlightIdx(null), 4000);
    return () => clearTimeout(t);
  }, [findContext]);

  // 选词检测：用户在转录区域选了一段文字 → 浮出 ✎ 更正 按钮
  const handleSelection = () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) { setPendingSel(null); return; }
    const text = sel.toString().trim();
    if (text.length < 1 || text.length > 60) { setPendingSel(null); return; }
    if (!containerRef.current || sel.rangeCount === 0) { setPendingSel(null); return; }
    const range = sel.getRangeAt(0);
    if (!containerRef.current.contains(range.commonAncestorContainer)) { setPendingSel(null); return; }
    const cRect = containerRef.current.getBoundingClientRect();
    const rects = range.getClientRects();
    const lastRect = rects.length > 0 ? rects[rects.length - 1] : range.getBoundingClientRect();
    setPendingSel({
      text,
      top: lastRect.bottom - cRect.top + 4,
      left: Math.max(0, lastRect.left - cRect.left),
    });
  };

  return (
    <div ref={containerRef} style={{ position: "relative" }} onMouseUp={handleSelection}>
      <div style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜索转录内容…"
          style={{ flex: 1, fontFamily: mno, fontSize: 11, color: C.text, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 4, padding: "5px 10px", outline: "none" }} />
        <span style={{ fontFamily: mno, fontSize: 9, color: C.textDim }}>{filteredSegs.length}/{segments.length}</span>
        {playing !== null && <button onClick={stopAudio} style={{ fontFamily: mno, fontSize: 9, color: C.red, background: "rgba(240,96,96,.06)", border: "1px solid rgba(240,96,96,.12)", borderRadius: 4, padding: "3px 8px", cursor: "pointer" }}>■ 停止</button>}
      </div>

      {/* 🔍 查找原文 提示条（短暂显示） */}
      {highlightIdx?.msg && (
        <div style={{ marginBottom: 8, padding: "8px 12px", background: "rgba(96,168,240,.08)", border: "1px solid rgba(96,168,240,.25)", borderRadius: 6, fontFamily: mno, fontSize: 11, color: C.blue }}>
          🔍 {highlightIdx.msg}
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
        {filteredSegs.map((seg, i) => {
          // 找到这个 seg 在 correctedSegs 里的全局 idx（match findContext 时用全局 idx）
          const globalIdx = correctedSegs.indexOf(seg);
          const isFound = highlightIdx && typeof highlightIdx.idx === "number" && highlightIdx.idx === globalIdx;
          return (
            <div key={i} data-seg-idx={globalIdx} style={{
              display: "flex", gap: 8, padding: "4px 8px", borderRadius: 4,
              background: isFound ? "#fff59d" : (playing === seg.start ? C.accentBg : (i % 2 === 0 ? C.surface : "transparent")),
              border: isFound ? "2px solid #f0d294" : (playing === seg.start ? `1px solid ${C.accentBorder}` : "1px solid transparent"),
              transition: "background .35s, border .35s",
            }}>
              <span onClick={() => audioUrl && (playing === seg.start ? stopAudio() : playFrom(seg.start))} style={{ fontFamily: mno, fontSize: 10, color: playing === seg.start ? C.red : C.accentDark, minWidth: 52, cursor: audioUrl ? "pointer" : "default", userSelect: "none" }}>{fmtTime(seg.start)}</span>
              {seg.speaker && <span style={{ fontFamily: mno, fontSize: 10, color: C.blue, minWidth: 40 }}>{seg.speaker}</span>}
              <p style={{ fontFamily: srf, fontSize: 13, color: C.textSec, lineHeight: 1.55, margin: 0, flex: 1 }}>{seg.text}</p>
            </div>
          );
        })}
      </div>

      {/* ✎ 更正 浮动按钮 — 选词后显示 */}
      {pendingSel && onCorrect && (
        <div style={{ position: "absolute", top: pendingSel.top, left: pendingSel.left, zIndex: 30, background: C.bg, border: `1px solid #b45309`, borderRadius: 5, padding: "4px 4px", boxShadow: "0 4px 12px rgba(0,0,0,0.12)" }}>
          <button onMouseDown={e => e.preventDefault()} onClick={() => { onCorrect(pendingSel.text, "transcript"); setPendingSel(null); }}
            title="更正这个词的拼写（自动加入名词库）"
            style={{ fontFamily: mno, fontSize: 11, color: "#b45309", background: C.bg, border: "none", padding: "2px 9px", cursor: "pointer", fontWeight: 600 }}>✎ 更正</button>
        </div>
      )}
    </div>
  );
}

// ─── Formatted Summary — 把总结文本解析为结构化块 ───
// 识别 ① 【…】 二级标题加粗  ② ▎HH:MM ... 章节小标题加粗  ③ 段落间距更紧凑
// 支持 annotations 参数 → 把命中文字包在 <mark> 里做黄底高亮
function FormattedSummary(props) {
  const { text, innerRef, onMouseUp, corrections, expansions, expansionLoading, expandPendings, onExpandRequest } = props;
  if (!text) return null;
  // 应用用户更正（在解析之前对原始文本做替换）
  const correctedText = corrections && corrections.length ? bpApplyCorrections(text, corrections) : text;
  const lines = correctedText.split(/\r?\n/);
  const blocks = [];
  let buf = [];
  const flushParagraph = () => {
    if (buf.length) {
      blocks.push({ type: "p", text: buf.join("\n") });
      buf = [];
    }
  };
  for (const raw of lines) {
    const line = raw;
    const trimmed = line.trim();
    if (!trimmed) {
      flushParagraph();
      continue;
    }
    if (/^【[^】]+】\s*$/.test(trimmed)) {
      flushParagraph();
      blocks.push({ type: "h2", text: trimmed });
      continue;
    }
    // ▎ 开头的章节标题（常见形式：▎02:00 做过陌生人社交）
    if (/^▎/.test(trimmed)) {
      flushParagraph();
      blocks.push({ type: "h3", text: trimmed });
      continue;
    }
    // "要点：" 独占一行 → 作为独立加粗块
    if (/^要点[：:]\s*$/.test(trimmed)) {
      flushParagraph();
      blocks.push({ type: "keypoint-label", text: trimmed });
      continue;
    }
    buf.push(line);
  }
  flushParagraph();

  // 段落解析：把 raw 文字拆成 atoms {italic, text}，然后按 annotations 做 mark 切片。
  // 这样 * 永远不会进入 mark 区间，斜体配对也不会被切断。
  const annotationsProp = props.annotations || [];

  const parseParagraphPieces = (raw) => {
    // Step 1: raw → atoms (plain + italic), 不含 *
    const atoms = [];
    const re = /\*([^*\n]+?)\*/g;
    let last = 0, m;
    while ((m = re.exec(raw)) !== null) {
      if (m.index > last) atoms.push({ italic: false, text: raw.slice(last, m.index) });
      atoms.push({ italic: true, text: m[1] });
      last = m.index + m[0].length;
    }
    if (last < raw.length) atoms.push({ italic: false, text: raw.slice(last) });

    // Step 2: plain 字符串（所有 atoms 拼起来，无 *）
    const plain = atoms.map(a => a.text).join("");

    // Step 3: 找 annotation 命中（长的优先以避免短的吃掉长的）
    // 旧批注可能存了带 * 的文本，匹配时 strip 掉 * 以和 plain 对齐
    const annSorted = [...annotationsProp].filter(a => (a.text || "").trim())
      .sort((a, b) => (b.text || "").length - (a.text || "").length);
    const ranges = []; // {start, end, annId}
    for (const a of annSorted) {
      const t = (a.text || "").trim().replace(/\*/g, "");
      if (!t) continue;
      let s = 0;
      while (s < plain.length) {
        const idx = plain.indexOf(t, s);
        if (idx < 0) break;
        const overlap = ranges.some(r => !(idx + t.length <= r.start || idx >= r.end));
        if (!overlap) ranges.push({ start: idx, end: idx + t.length, annId: a.id });
        s = idx + t.length;
      }
    }
    ranges.sort((a, b) => a.start - b.start);

    // Step 4: 在 atoms 上按 range 边界切分。每个 piece 保留 italic 标志 + 可选 annId。
    const pieces = [];
    let pos = 0;
    for (const atom of atoms) {
      const atomStart = pos;
      const atomEnd = pos + atom.text.length;
      let local = 0;
      for (const r of ranges) {
        if (r.end <= atomStart) continue;
        if (r.start >= atomEnd) break;
        const ovStart = Math.max(atomStart, r.start);
        const ovEnd = Math.min(atomEnd, r.end);
        const ovLocalStart = ovStart - atomStart;
        const ovLocalEnd = ovEnd - atomStart;
        // 前导无 mark
        if (ovLocalStart > local) {
          pieces.push({ text: atom.text.slice(local, ovLocalStart), italic: atom.italic, annId: null });
        }
        // mark 片段
        pieces.push({ text: atom.text.slice(ovLocalStart, ovLocalEnd), italic: atom.italic, annId: r.annId });
        local = ovLocalEnd;
      }
      // 剩余无 mark
      if (local < atom.text.length) {
        pieces.push({ text: atom.text.slice(local), italic: atom.italic, annId: null });
      }
      pos = atomEnd;
    }
    return pieces;
  };

  const renderInline = (raw) => {
    if (!raw) return raw;
    const pieces = parseParagraphPieces(raw);
    const EM_STYLE = { fontStyle: "italic", color: "#0a1f5c", fontWeight: 500 };
    // mark 只加黄底，不改字体/字重/颜色 → 内部 <em> 保持斜体深蓝
    const MARK_STYLE = { background: "#fff59d", color: "inherit", padding: "0 1px", borderRadius: 2 };
    return pieces.map((p, i) => {
      // 最后一道防线：piece 里理应不再有 *（atom 已吞掉），但以防万一 strip 一次
      let node = (p.text || "").replace(/\*/g, "");
      if (p.italic) node = <em key={`em-${i}`} style={EM_STYLE}>{node}</em>;
      if (p.annId) {
        node = (
          <mark key={`mk-${i}`} data-ann-id={p.annId} style={MARK_STYLE}>{node}</mark>
        );
      } else if (!p.italic) {
        node = <React.Fragment key={`tx-${i}`}>{node}</React.Fragment>;
      }
      return node;
    });
  };

  // 给每个 block 标注它属于哪个章节（h3 索引）
  // -1 = 在第一个 h3 之前（如【核心观点】下的段落）
  let _chapterCounter = -1;
  const blockChapter = blocks.map(b => {
    if (b.type === "h3") _chapterCounter++;
    return _chapterCounter;
  });
  // 章节 keys（h3 文字本身做 key），并提取时间戳秒数
  const chapterMeta = [];  // [{key, startSec}]
  blocks.forEach(b => {
    if (b.type === "h3") {
      const m = b.text.match(/^▎\s*(?:(\d+):)?(\d+):(\d+)/);
      let sec = 0;
      if (m) {
        const hh = parseInt(m[1] || "0");
        const mm = parseInt(m[2] || "0");
        const ss = parseInt(m[3] || "0");
        sec = hh * 3600 + mm * 60 + ss;
      }
      chapterMeta.push({ key: b.text, startSec: sec });
    }
  });
  // 章节是否被展开
  const isExpanded = (cIdx) => cIdx >= 0 && expansions && expansions[chapterMeta[cIdx]?.key];
  const isLoading = (cIdx) => cIdx >= 0 && expansionLoading && expansionLoading[chapterMeta[cIdx]?.key];
  // 跨电脑队列里这个章节是不是 pending/processing（主电脑 worker 还没处理完）
  const isCloudPending = (cIdx) => {
    if (cIdx < 0 || !expandPendings) return false;
    const ck = chapterMeta[cIdx]?.key;
    const p = ck && expandPendings[ck];
    return p && (p.status === "pending" || p.status === "processing");
  };

  return (
    <div ref={innerRef} onMouseUp={onMouseUp}
      style={{ fontFamily: srf, fontSize: 14.5, color: C.text, lineHeight: 1.7, background: C.surface, borderRadius: 8, padding: "16px 22px", border: `1px solid ${C.border}`, userSelect: "text" }}>
      {blocks.map((b, i) => {
        const cIdx = blockChapter[i];
        const expanded = isExpanded(cIdx);
        const loading = isLoading(cIdx);
        const cloudPending = isCloudPending(cIdx);

        if (b.type === "h2") {
          return <h2 key={i} style={{ fontFamily: srf, fontSize: 17, fontWeight: 700, color: C.text, margin: i === 0 ? "0 0 8px" : "18px 0 8px", lineHeight: 1.35 }}>{b.text}</h2>;
        }
        if (b.type === "h3") {
          const meta = chapterMeta[cIdx];
          const endSec = chapterMeta[cIdx + 1]?.startSec || (meta?.startSec || 0) + 60 * 60;
          // 收集本章节当前文字（用作 prompt 的 current_text）
          const sectionEnd = blocks.findIndex((bb, j) => j > i && bb.type === "h3");
          const sectionBlocks = blocks.slice(i, sectionEnd > 0 ? sectionEnd : undefined);
          const sectionText = sectionBlocks.map(bb => bb.text).join("\n\n");
          return (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", margin: "14px 0 6px", gap: 8 }}>
              <h3 style={{ fontFamily: srf, fontSize: 14.5, fontWeight: 700, color: C.text, margin: 0, lineHeight: 1.4, flex: 1 }}>{b.text}</h3>
              {onExpandRequest && (
                <button
                  onClick={() => {
                    if (loading || cloudPending) return;
                    if (expanded) {
                      // 二次点击 → 还原
                      onExpandRequest({ action: "revert", chapterKey: meta.key });
                    } else {
                      onExpandRequest({ action: "expand", chapterKey: meta.key, startSec: meta.startSec, endSec, currentText: sectionText });
                    }
                  }}
                  title={
                    expanded ? "已展开详细版本，点击还原" :
                    loading ? "正在生成更详细版本…" :
                    cloudPending ? "已委托主电脑生成，dashboard 每 60 秒自动同步一次" :
                    "用 transcript + Opus 生成 2-3x 长度的更详细版本"
                  }
                  style={{
                    fontFamily: mno, fontSize: 9, fontWeight: 600,
                    padding: "3px 9px", borderRadius: 4, cursor: (loading || cloudPending) ? "default" : "pointer",
                    color: (loading || cloudPending) ? C.textDim : (expanded ? "#0a1f5c" : "#7c3aed"),
                    background: expanded ? "rgba(10,31,92,.08)" : ((loading || cloudPending) ? C.surface : "rgba(124,58,237,.08)"),
                    border: `1px solid ${expanded ? "rgba(10,31,92,.25)" : ((loading || cloudPending) ? C.border : "rgba(124,58,237,.25)")}`,
                    whiteSpace: "nowrap",
                    opacity: (loading || cloudPending) ? 0.7 : 1,
                  }}>
                  {loading ? "⏳ 生成中…" :
                   cloudPending ? "⏳ 已委托主电脑" :
                   expanded ? "✓ 已展开详细版" :
                   "+ 更详细总结"}
                </button>
              )}
            </div>
          );
        }
        // 章节内容块：如果该章节已展开 → 用扩展文本替代（仅在第一个非 h3 块渲染扩展文本，其它跳过）
        if (cIdx >= 0 && expanded) {
          // 找到该章节的第一个非 h3 块的位置
          const firstContentI = blocks.findIndex((bb, j) => j > 0 && blockChapter[j] === cIdx && bb.type !== "h3");
          if (i !== firstContentI) return null;  // 跳过该章节后续原始块（被扩展文本覆盖）
          const expandedText = expansions[chapterMeta[cIdx].key].text || "";
          // 用同样的 inline 渲染逻辑（识别 *italic* + 高亮）
          const expandedLines = expandedText.split(/\r?\n/);
          return (
            <div key={i} style={{ marginTop: 4, padding: "10px 12px", background: "rgba(10,31,92,.02)", border: "1px solid rgba(10,31,92,.10)", borderRadius: 5 }}>
              <div style={{ fontFamily: mno, fontSize: 9, color: "#0a1f5c", marginBottom: 6, fontWeight: 600 }}>详细版本（Opus 4.7 基于 transcript 重新展开）</div>
              {expandedLines.map((line, k) => {
                const t = line.trim();
                if (!t) return <div key={k} style={{ height: 6 }} />;
                if (/^要点[：:]\s*$/.test(t)) {
                  return <p key={k} style={{ fontFamily: srf, fontSize: 14.5, fontWeight: 700, color: C.text, margin: "12px 0 4px", lineHeight: 1.5 }}>{t}</p>;
                }
                return <p key={k} style={{ fontFamily: srf, fontSize: 14.5, color: C.text, lineHeight: 1.7, margin: "0 0 7px", whiteSpace: "pre-wrap" }}>{renderInline(line)}</p>;
              })}
            </div>
          );
        }
        // "要点：" 标记行 — 本身加粗，上间距额外拉开
        if (b.type === "keypoint-label") {
          return <p key={i} style={{ fontFamily: srf, fontSize: 14.5, fontWeight: 700, color: C.text, margin: "14px 0 4px", lineHeight: 1.5 }}>{b.text}</p>;
        }
        return <p key={i} style={{ fontFamily: srf, fontSize: 14.5, color: C.text, lineHeight: 1.7, margin: "0 0 7px", whiteSpace: "pre-wrap" }}>{renderInline(b.text)}</p>;
      })}
    </div>
  );
}

// ─── Annotation Sidebar (Word-style 批注) ───
// 新版：每张批注卡绝对定位在对应黄色高亮的 Y 坐标；卡不跟随滚动独立动，因为它和正文一起随页面滚
function AnnotationSidebar({ ep, annotations, setAnnotations, summaryRef, editingIds, setEditingIds, textareaRefs, sourceText }) {
  const [posMap, setPosMap] = useState({}); // ann_id -> { top, height }
  const [layoutTick, setLayoutTick] = useState(0);
  const cardRefs = useRef({});
  const asideRef = useRef(null);
  const [containerW] = useState(300);

  // 测量+布局：
  //   1) 每条批注对应 <mark> 的 Y（相对 aside 本身，也就是卡片的定位坐标系）= 期望 top
  //   2) 测量每张卡片实际高度
  //   3) bump-down 避让：从上往下走，如果当前卡片 top 会和上一卡片重叠，就向下推
  //      → 能排开时保持在 mark 原位；排不开时顺延（自然叠放）
  useLayoutEffect(() => {
    if (!summaryRef.current || !asideRef.current) return;
    const marks = summaryRef.current.querySelectorAll("mark[data-ann-id]");
    const asideBox = asideRef.current.getBoundingClientRect();

    // Step 1: 期望 top = mark Y 相对 aside 顶部
    const desired = {};
    const seen = new Set();
    marks.forEach(m => {
      const id = m.getAttribute("data-ann-id");
      if (!id || seen.has(id)) return;
      seen.add(id);
      const markBox = m.getBoundingClientRect();
      desired[id] = markBox.top - asideBox.top;
    });

    // Step 2: 按期望 top 升序排序
    const withDesired = annotations.filter(a => desired[a.id] != null);
    withDesired.sort((a, b) => desired[a.id] - desired[b.id]);

    // Step 3: 测量卡片高度（使用已渲染的 cardRefs；首次渲染时 fallback 70）
    const heights = {};
    withDesired.forEach(a => {
      const el = cardRefs.current[a.id];
      heights[a.id] = el ? el.getBoundingClientRect().height : 70;
    });

    // Step 4: bump-down —— 能排开就按 mark Y 放，重叠就向下推
    const GAP = 8;
    const TOP_PAD = 46; // 避开 sticky "批注 · N" 标题条
    const result = {};
    let floor = TOP_PAD;
    for (const a of withDesired) {
      const want = Math.max(desired[a.id], TOP_PAD);
      const top = Math.max(want, floor);
      result[a.id] = { top, height: heights[a.id] };
      floor = top + heights[a.id] + GAP;
    }

    // 避免没变化时多余 setState 造成无限循环
    setPosMap(prev => {
      const prevKeys = Object.keys(prev);
      const newKeys = Object.keys(result);
      if (prevKeys.length === newKeys.length &&
          newKeys.every(k => prev[k] && Math.abs(prev[k].top - result[k].top) < 0.5 && Math.abs(prev[k].height - result[k].height) < 0.5)) {
        return prev;
      }
      return result;
    });
  }, [summaryRef, annotations, editingIds, layoutTick]);

  // 窗口缩放时重新布局
  useEffect(() => {
    const onResize = () => setLayoutTick(v => v + 1);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const expandForEdit = (id) => {
    setEditingIds(prev => { const n = new Set(prev); n.add(id); return n; });
    setTimeout(() => { textareaRefs.current[id]?.focus(); }, 60);
  };
  const collapseIfEmpty = (id, note) => {
    if (!note || !note.trim()) {
      setEditingIds(prev => { const n = new Set(prev); n.delete(id); return n; });
    }
  };
  const updateNote = (id, note) => {
    const updated = annotations.map(a => a.id === id ? { ...a, note, updated: Date.now() } : a);
    setAnnotations(updated);
    BP_RATING_DB.saveAnnotations(ep._id, updated);
    const totalChars = BP_RATING_DB.getAnnotationCharCount(ep._id);
    bpImplicitBoost(ep, bpAnnotationBoostStrength(totalChars));
  };
  const deleteAnn = (id) => {
    const updated = annotations.filter(a => a.id !== id);
    setAnnotations(updated);
    BP_RATING_DB.saveAnnotations(ep._id, updated);
  };

  // 导出功能：把整份总结（格式保留）+ 黄色高亮 + 评论（高亮后面黄色字体）输出为富文本
  const exportNotes = () => {
    const fullText = ep.detailedSummary || ep.briefSummary || "";

    // HTML 转义
    const esc = (s) => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

    // 构建 annotation lookup（同 FormattedSummary 的逻辑）
    const anns = (annotations || []).filter(a => (a.text || "").trim());
    const annsSorted = [...anns].sort((a, b) => (b.text || "").length - (a.text || "").length);
    const annByText = {};
    for (const a of anns) {
      const t = (a.text || "").trim();
      if (t && !annByText[t]) annByText[t] = a;
    }

    // 解析 raw 为 blocks（同 FormattedSummary）
    const lines = fullText.split(/\r?\n/);
    const blocks = []; // {type, text}
    let buf = [];
    const flushP = () => { if (buf.length) { blocks.push({ type: "p", text: buf.join("\n") }); buf = []; } };
    for (const raw of lines) {
      const trimmed = raw.trim();
      if (!trimmed) { flushP(); continue; }
      if (/^【[^】]+】\s*$/.test(trimmed)) { flushP(); blocks.push({ type: "h2", text: trimmed }); continue; }
      if (/^▎/.test(trimmed)) { flushP(); blocks.push({ type: "h3", text: trimmed }); continue; }
      if (/^要点[：:]\s*$/.test(trimmed)) { flushP(); blocks.push({ type: "keypoint-label", text: trimmed }); continue; }
      buf.push(raw);
    }
    flushP();

    // 段落内：atom-based 算法（与 FormattedSummary 保持一致）
    // raw → atoms {italic, text} 不含 * → 在 plain 上找 annotation 区间 → atom 按区间切片
    // 这样 * 永远不会进入 mark 区间，斜体配对也不会被切断
    const renderParaHtml = (raw) => {
      // Step 1: raw → atoms
      const atoms = [];
      const reIt = /\*([^*\n]+?)\*/g;
      let last = 0, m;
      while ((m = reIt.exec(raw)) !== null) {
        if (m.index > last) atoms.push({ italic: false, text: raw.slice(last, m.index) });
        atoms.push({ italic: true, text: m[1] });
        last = m.index + m[0].length;
      }
      if (last < raw.length) atoms.push({ italic: false, text: raw.slice(last) });

      // Step 2: plain 拼接（无 *）
      const plain = atoms.map(a => a.text).join("");

      // Step 3: 在 plain 上找 annotation 区间（长的优先，不重叠）
      // 旧批注文本可能含有 *，strip 后再和无 * 的 plain 对齐
      const ranges = [];
      for (const a of annsSorted) {
        const t = (a.text || "").trim().replace(/\*/g, "");
        if (!t) continue;
        let s = 0;
        while (s < plain.length) {
          const idx = plain.indexOf(t, s);
          if (idx < 0) break;
          const overlap = ranges.some(r => !(idx + t.length <= r.start || idx >= r.end));
          if (!overlap) ranges.push({ start: idx, end: idx + t.length, ann: a });
          s = idx + t.length;
        }
      }
      ranges.sort((a, b) => a.start - b.start);

      // Step 4: 把 atoms 按 range 边界切片 → pieces {text, italic, ann}
      const pieces = [];
      let pos = 0;
      for (const atom of atoms) {
        const atomStart = pos;
        const atomEnd = pos + atom.text.length;
        let local = 0;
        for (const r of ranges) {
          if (r.end <= atomStart) continue;
          if (r.start >= atomEnd) break;
          const ovStart = Math.max(atomStart, r.start);
          const ovEnd = Math.min(atomEnd, r.end);
          const ovLocalStart = ovStart - atomStart;
          const ovLocalEnd = ovEnd - atomStart;
          if (ovLocalStart > local) {
            pieces.push({ text: atom.text.slice(local, ovLocalStart), italic: atom.italic, ann: null });
          }
          pieces.push({ text: atom.text.slice(ovLocalStart, ovLocalEnd), italic: atom.italic, ann: r.ann });
          local = ovLocalEnd;
        }
        if (local < atom.text.length) {
          pieces.push({ text: atom.text.slice(local), italic: atom.italic, ann: null });
        }
        pos = atomEnd;
      }

      // Step 5: 生成 HTML。Word 对 <mark> 支持不稳定，改用 <span style='background-color'>
      // 这样 .doc 导出打开后黄底才会显示
      const emStyle = "font-style:italic;color:#0a1f5c;font-weight:bold";
      const hlStyle = "background-color:#fff59d";
      const out = [];
      for (let i = 0; i < pieces.length; i++) {
        const p = pieces[i];
        // 最后一道防线：strip 掉任何残留的 *
        let inner = esc((p.text || "").replace(/\*/g, ""));
        if (p.italic) inner = `<span style='${emStyle}'>${inner}</span>`;
        if (p.ann) {
          out.push(`<span style='${hlStyle}'>${inner}</span>`);
          const next = pieces[i + 1];
          const sameAnnNext = next && next.ann && next.ann.id === p.ann.id;
          if (!sameAnnNext) {
            const noteText = (p.ann.note || "").trim();
            if (noteText) {
              out.push(`&nbsp;<span style='color:#a16207;font-weight:bold'>（${esc(noteText)}）</span>`);
            }
          }
        } else {
          out.push(inner);
        }
      }
      return out.join("");
    };

    // 组装 Word HTML body（pt 单位 + Microsoft YaHei 保证 Word 渲染正常）
    const body = [];
    body.push(`<h1 style='font-size:18pt;font-weight:bold;margin:0 0 4pt'>${esc(ep.title || "")}</h1>`);
    body.push(`<p style='font-size:10pt;color:#666;margin:0 0 18pt'>${esc(ep._channelName || "")} · ${esc(ep.date || "")}</p>`);
    blocks.forEach((b, i) => {
      if (b.type === "h2") {
        const mt = i === 0 ? 0 : 18;
        body.push(`<h2 style='font-size:15pt;font-weight:bold;margin:${mt}pt 0 8pt'>${esc(b.text)}</h2>`);
      } else if (b.type === "h3") {
        body.push(`<h3 style='font-size:13pt;font-weight:bold;margin:14pt 0 6pt'>${esc(b.text)}</h3>`);
      } else if (b.type === "keypoint-label") {
        body.push(`<p style='font-size:11pt;font-weight:bold;margin:14pt 0 4pt'>${esc(b.text)}</p>`);
      } else {
        const inner = renderParaHtml(b.text).replace(/\n/g, "<br/>");
        body.push(`<p style='font-size:11pt;line-height:1.6;margin:0 0 7pt'>${inner}</p>`);
      }
    });

    // Word 能直接识别的 .doc（HTML 格式，包含 MSO XML 命名空间）
    const doc = `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="ProgId" content="Word.Document">
<meta name="Generator" content="Microsoft Word 15">
<title>${esc(ep.title || "")}</title>
<xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml>
<style>
@page WordSection1 { size: 595.3pt 841.9pt; margin: 72pt; }
body { font-family: "Microsoft YaHei","Segoe UI","Crimson Pro",serif; color: #222; }
p { margin: 0 0 7pt; }
</style>
</head>
<body>
<div class="WordSection1">
${body.join("\n")}
</div>
</body>
</html>`;

    const filename = `${(ep.title || ep._id || "summary").replace(/[\\\/:*?"<>|]/g, "_").slice(0, 80)}.doc`;
    const blob = new Blob(["\uFEFF" + doc], { type: "application/msword" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // 按 Y 从小到大排序渲染（保证视觉上自上而下）
  const sortedAnns = [...annotations].sort((a, b) => (posMap[a.id]?.top ?? 99999) - (posMap[b.id]?.top ?? 99999));

  return (
    <aside ref={asideRef} style={{ width: containerW, flexShrink: 0, borderLeft: `1px solid ${C.border}`, background: "#fafbfc", position: "relative" }}>
      {/* 顶部标题条 */}
      <div style={{ position: "sticky", top: 0, zIndex: 2, background: "#fafbfc", padding: "10px 12px 6px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6 }}>
        <h3 style={{ fontFamily: mno, fontSize: 10, color: C.textDim, letterSpacing: 1, margin: 0, textTransform: "uppercase" }}>批注 · {annotations.length}</h3>
        {annotations.length > 0 && (
          <button onClick={exportNotes} title="复制全部批注为文本（含时间段标题）" style={{ fontFamily: mno, fontSize: 9, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 4, padding: "3px 8px", cursor: "pointer" }}>导出</button>
        )}
      </div>
      {annotations.length === 0 && (
        <div style={{ fontFamily: srf, fontSize: 12, color: C.textDim, fontStyle: "italic", padding: "28px 12px", lineHeight: 1.7, textAlign: "center", margin: "12px" }}>
          在左侧总结里选中文字 →<br/>点 <b>✓ 确定</b> 添加批注<br/><br/>可以不写评论<br/>所有批注自动保存到浏览器
        </div>
      )}
      {/* 每条批注绝对定位在高亮 Y 位置（bump-down 避让，能排开就排开） */}
      {sortedAnns.map(a => {
        const entry = posMap[a.id];
        const top = entry ? entry.top : null;
        const positioned = typeof top === "number";
        const hasNote = (a.note || "").trim().length > 0;
        const showTextarea = hasNote || editingIds.has(a.id);
        return (
          <div key={a.id}
            ref={el => { if (el) cardRefs.current[a.id] = el; else delete cardRefs.current[a.id]; }}
            style={{
              position: positioned ? "absolute" : "relative",
              top: positioned ? `${top}px` : "auto",
              left: positioned ? 8 : 8,
              right: 8,
              margin: positioned ? 0 : "8px",
              background: C.bg,
              border: `1px solid ${C.border}`,
              borderLeft: `3px solid ${C.noteBorder}`,
              borderRadius: 4,
              padding: "7px 10px",
              display: "flex",
              flexDirection: "column",
              gap: 5,
              transition: "top .15s"
            }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 6 }}>
              <div style={{ fontFamily: srf, fontSize: 11, color: C.textSec, lineHeight: 1.5, flex: 1 }}>
                {(() => {
                  // 按原文样式渲染：原文 *...* 内是斜体，否则普通正体
                  // 长批注截断到 100 字
                  const truncated = a.text.length > 100 ? a.text.slice(0, 100) + "…" : a.text;
                  const atoms = bpSplitByItalicFromSource(truncated, sourceText || "");
                  return (
                    <span>
                      "{atoms.map((atom, i) => atom.italic
                        ? <em key={i} style={{ fontStyle: "italic", color: "#0a1f5c", fontWeight: 500 }}>{atom.text}</em>
                        : <span key={i}>{atom.text}</span>
                      )}"
                    </span>
                  );
                })()}
              </div>
              <button onClick={() => deleteAnn(a.id)} title="删除" style={{ fontFamily: mno, fontSize: 11, color: C.textDim, background: "none", border: "none", cursor: "pointer", padding: "0 2px", lineHeight: 1 }}>✕</button>
            </div>
            {showTextarea ? (
              <>
                <textarea
                  ref={el => { if (el) textareaRefs.current[a.id] = el; }}
                  value={a.note || ""}
                  onChange={e => updateNote(a.id, e.target.value)}
                  onBlur={e => collapseIfEmpty(a.id, e.target.value)}
                  placeholder="写下你的批注…"
                  style={{ fontFamily: srf, fontSize: 13, color: C.text, background: "transparent", border: "none", outline: "none", resize: "vertical", minHeight: 40, lineHeight: 1.55, width: "100%", padding: 0, boxSizing: "border-box" }}
                />
                {hasNote && (
                  <div style={{ fontFamily: mno, fontSize: 8, color: C.textDim, textAlign: "right" }}>{new Date(a.updated).toLocaleDateString()} · {(a.note || "").length} 字</div>
                )}
              </>
            ) : (
              <button onClick={() => expandForEdit(a.id)} style={{ fontFamily: mno, fontSize: 9, color: C.textDim, background: "none", border: "none", cursor: "pointer", padding: 0, alignSelf: "flex-start", marginTop: 1 }}>+ 添加评论</button>
            )}
          </div>
        );
      })}
    </aside>
  );
}

// ─── Detail Page ───
function DetailPage({ ep, onBack }) {
  const [tab, setTab] = useState("summary");
  // 迁移：1) 旧版占位评论 "1" 清成空；2) 批注 text 字段清掉残留的 * 字符
  // （旧版渲染 bug 会把 *X* 显示为字面 *X*，导致用户选中时连 * 一起存进来）
  const loadAndMigrate = () => {
    const raw = BP_RATING_DB.getAnnotations(ep._id);
    let changed = false;
    const migrated = raw.map(a => {
      const updates = {};
      if ((a.note || "").trim() === "1") { updates.note = ""; }
      if (a.text && a.text.includes("*")) { updates.text = a.text.replace(/\*/g, ""); }
      if (Object.keys(updates).length) { changed = true; return { ...a, ...updates }; }
      return a;
    });
    if (changed) BP_RATING_DB.saveAnnotations(ep._id, migrated);
    return migrated;
  };
  const [annotations, setAnnotations] = useState(loadAndMigrate);
  const [pendingSelection, setPendingSelection] = useState(null);
  const [editingIds, setEditingIds] = useState(() => new Set());  // 哪些批注卡正在展开 textarea
  const [corrections, setCorrections] = useState(() => BP_RATING_DB.getCorrections(ep._id));
  const [correctionModal, setCorrectionModal] = useState(null);  // null | {original, location}
  const [findContext, setFindContext] = useState(null);  // {text, ts} 触发转录页跳转 + 高亮
  const [expansions, setExpansions] = useState(() => BP_RATING_DB.getExpansions(ep._id));
  const [expansionLoading, setExpansionLoading] = useState({});  // {chapter_key: true/false}
  const [expandPendings, setExpandPendings] = useState(() => BP_RATING_DB.getExpandPending(ep._id));  // {chapter_key: {status, ...}} 跨电脑队列待办
  // 版本切换：如果当前 ep 有 _alternateVersion 字段，可以切换到旧版（Whisper）做对比
  const [showAlternate, setShowAlternate] = useState(false);
  const hasAlternate = !!ep._alternateVersion;
  const activeData = showAlternate && hasAlternate ? {
    detailedSummary: ep._alternateVersion.detailedSummary || ep.detailedSummary,
    briefSummary: ep._alternateVersion.briefSummary || ep.briefSummary,
    transcriptSegments: ep._alternateVersion.transcriptSegments || ep.transcriptSegments,
    label: ep._alternateVersion.label || "alt",
  } : {
    detailedSummary: ep.detailedSummary,
    briefSummary: ep.briefSummary,
    transcriptSegments: ep.transcriptSegments,
    label: (ep._transcribeModel || "").includes("gpt-4o") ? "GPT-4o + 对齐" : "Whisper",
  };
  const textareaRefs = useRef({});
  const summaryRef = useRef(null);
  const hasTranscript = activeData.transcriptSegments?.length > 0;

  // 打开更正 modal — 由选词工具栏 / 转录区按钮 / 都可以触发
  const openCorrectionModal = (selectedText, location) => {
    if (!selectedText || !selectedText.trim()) return;
    setCorrectionModal({ original: selectedText.trim(), location });
    // 清掉选区（避免遮挡 modal）
    if (window.getSelection) window.getSelection().removeAllRanges();
    setPendingSelection(null);
  };
  const onCorrectionApplied = () => {
    setCorrections(BP_RATING_DB.getCorrections(ep._id));
  };

  // 🔍 章节"+ 更详细总结"请求处理
  // 本机有 daemon → 直接调（60-90s 直接出结果）
  // 本机没 daemon → 写云端任务队列 → 主电脑 worker 处理 → 1-3 分钟后同步过来
  const handleExpandRequest = async ({ action, chapterKey, startSec, endSec, currentText }) => {
    if (action === "revert") {
      BP_RATING_DB.removeExpansion(ep._id, chapterKey);
      BP_RATING_DB.removeExpandPending(ep._id, chapterKey);
      setExpansions(BP_RATING_DB.getExpansions(ep._id));
      setExpandPendings(BP_RATING_DB.getExpandPending(ep._id));
      return;
    }
    // action === "expand"
    setExpansionLoading(prev => ({ ...prev, [chapterKey]: true }));

    // 1) 探测本机 daemon
    let daemonOk = false;
    try {
      const probe = await fetch("http://127.0.0.1:9878/status", { method: "GET" });
      daemonOk = probe.ok;
    } catch { daemonOk = false; }

    if (daemonOk) {
      // 本机 daemon 可用：直接调
      try {
        const r = await fetch("http://127.0.0.1:9878/expand_section", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ep_id: ep._id.replace(/^preset-/, ""),
            chapter_key: chapterKey,
            start_sec: startSec,
            end_sec: endSec,
            current_text: currentText,
          }),
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok && data.ok && data.expanded_text) {
          BP_RATING_DB.setExpansion(ep._id, chapterKey, {
            text: data.expanded_text,
            model: "claude-opus-4-7",
            start_sec: startSec,
            end_sec: endSec,
          });
          // 清掉可能存在的 pending（之前在副电脑下的单）
          BP_RATING_DB.removeExpandPending(ep._id, chapterKey);
          setExpansions(BP_RATING_DB.getExpansions(ep._id));
          setExpandPendings(BP_RATING_DB.getExpandPending(ep._id));
        } else {
          alert(`生成失败：${data.error || `HTTP ${r.status}`}`);
        }
      } catch (e) {
        alert(`守护进程不可用：${e.message || e}`);
      } finally {
        setExpansionLoading(prev => { const n = { ...prev }; delete n[chapterKey]; return n; });
      }
    } else {
      // 没本机 daemon：写云端任务队列，主电脑 worker 会拉取处理
      BP_RATING_DB.setExpandPending(ep._id, chapterKey, {
        ep_id: ep._id.replace(/^preset-/, ""),
        chapter_key: chapterKey,
        start_sec: startSec,
        end_sec: endSec,
        current_text: currentText,
      });
      setExpandPendings(BP_RATING_DB.getExpandPending(ep._id));
      // 立即触发 backup 推送：写到云端 user_data_sync.json，主电脑 worker 看到后开始处理
      try { BP_BACKUP.flush(); } catch {}
      setExpansionLoading(prev => { const n = { ...prev }; delete n[chapterKey]; return n; });
      alert("⏳ 已委托主电脑生成，预计 1-3 分钟后自动展开。\n\n（dashboard 会每 60 秒自动同步一次，无需刷新）");
    }
  };

  // 周期性从 localStorage 重读 expansions / expand_pending
  // 让 syncFromCloud 拉到的远端结果（如主电脑生成完的 expansion / 状态升级的 pending）能在 DetailPage 看到
  React.useEffect(() => {
    const refresh = () => {
      const newExp = BP_RATING_DB.getExpansions(ep._id);
      const newPend = BP_RATING_DB.getExpandPending(ep._id);
      setExpansions(prev => JSON.stringify(prev) !== JSON.stringify(newExp) ? newExp : prev);
      setExpandPendings(prev => JSON.stringify(prev) !== JSON.stringify(newPend) ? newPend : prev);
    };
    const t = setInterval(refresh, 8000);  // 8s 检查一次（syncFromCloud 是 60s）
    return () => clearInterval(t);
  }, [ep._id]);

  // 🔍 查找原文：切到转录 tab + 滚到对应 segment + 短暂高亮
  const triggerFindOriginal = (selectedText) => {
    if (!selectedText || !selectedText.trim()) return;
    // 清掉划词浮动栏 + 选区
    if (window.getSelection) window.getSelection().removeAllRanges();
    setPendingSelection(null);
    // 切到转录 tab
    setTab("transcript");
    // 推一个新的 findContext（带 ts 让 TranscriptViewer 识别为新触发）
    setFindContext({ text: selectedText.trim(), ts: Date.now() });
  };

  const addFromSelection = (withNote = false) => {
    if (!pendingSelection?.text) return;
    // 保存时即 strip 掉 *（旧版渲染残留），保证 localStorage 里永远不会再存带 * 的批注 text
    const cleanText = pendingSelection.text.replace(/\*/g, "");
    const newAnn = { id: `ann_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`, text: cleanText, note: "", created: Date.now(), updated: Date.now() };
    const updated = [newAnn, ...annotations];
    setAnnotations(updated);
    BP_RATING_DB.saveAnnotations(ep._id, updated);
    if (withNote) {
      setEditingIds(prev => { const n = new Set(prev); n.add(newAnn.id); return n; });
      setTimeout(() => { textareaRefs.current[newAnn.id]?.focus(); }, 60);
    }
    // 清选区但保留浮动按钮到下次选区变化，确保用户看到"已保存"视觉反馈不会太突兀
    if (window.getSelection) window.getSelection().removeAllRanges();
    setPendingSelection(null);
  };

  // 检测用户在 summary 内选中文字 — 记录选区坐标用于浮动工具栏定位
  const handleTextSelection = () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) { setPendingSelection(null); return; }
    const text = sel.toString().trim();
    if (text.length < 2) { setPendingSelection(null); return; }
    if (summaryRef.current && sel.rangeCount > 0) {
      const range = sel.getRangeAt(0);
      if (summaryRef.current.contains(range.commonAncestorContainer)) {
        // 记录选区末端 Y/X（相对 data-ann-anchor 容器）
        const container = summaryRef.current.closest("[data-ann-anchor]");
        const cRect = container?.getBoundingClientRect() ?? { top: 0, left: 0 };
        const rects = range.getClientRects();
        const lastRect = rects.length > 0 ? rects[rects.length - 1] : range.getBoundingClientRect();
        setPendingSelection({
          text,
          top: lastRect.top - cRect.top,
          bottom: lastRect.bottom - cRect.top,
          left: lastRect.left - cRect.left,
          right: lastRect.right - cRect.left,
        });
        return;
      }
    }
    setPendingSelection(null);
  };
  const showSidebar = tab === "summary";

  return (
    <div style={{ minHeight: "100vh", background: C.bg, animation: "fadeIn .25s ease" }}>
      <div style={{ position: "sticky", top: 0, zIndex: 50, background: "rgba(255,255,255,.95)", backdropFilter: "blur(12px)", borderBottom: `1px solid ${C.border}`, padding: "8px 24px", display: "flex", alignItems: "center", gap: 12 }}>
        <button onClick={onBack} style={{ fontFamily: mno, fontSize: 11, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "4px 10px", cursor: "pointer" }}>← 返回</button>
        <span style={{ fontFamily: mno, fontSize: 10, color: C.textDim, letterSpacing: 1 }}>{ep._channelName}</span>
        {hasTranscript && <span style={{ fontFamily: mno, fontSize: 9, color: C.accent, background: C.accentBg, padding: "1px 6px", borderRadius: 4, border: `1px solid ${C.accentBorder}` }}>✓ {activeData.transcriptSegments.length}段</span>}
        {hasAlternate && (
          <button onClick={() => setShowAlternate(s => !s)}
            title={`当前 ${activeData.label} 版本，点击切换到另一版本对比`}
            style={{ fontFamily: mno, fontSize: 9, color: showAlternate ? "#7c3aed" : C.accentDark, background: showAlternate ? "rgba(124,58,237,.1)" : C.bg, border: `1px solid ${showAlternate ? "rgba(124,58,237,.35)" : C.border}`, borderRadius: 4, padding: "1px 8px", cursor: "pointer", fontWeight: 500 }}>
            🔄 {activeData.label}
          </button>
        )}
        {annotations.length > 0 && <span style={{ fontFamily: mno, fontSize: 9, color: "#b45309", background: C.noteBg, padding: "1px 6px", borderRadius: 4, border: `1px solid ${C.noteBorder}` }}>✎ {annotations.length}条批注</span>}
        <button onClick={() => {
          const url = window.location.href;
          if (navigator.clipboard?.writeText) {
            navigator.clipboard.writeText(url).then(() => {
              const el = document.getElementById("bp-share-toast");
              if (el) { el.textContent = "✓ 链接已复制"; el.style.opacity = "1"; setTimeout(() => { el.style.opacity = "0"; }, 1800); }
            });
          } else {
            window.prompt("复制下面的链接：", url);
          }
        }} title="复制本集的独立链接，可以发给别人" style={{ fontFamily: mno, fontSize: 10, color: C.textSec, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "4px 10px", cursor: "pointer" }}>🔗 复制链接</button>
        <span id="bp-share-toast" style={{ fontFamily: mno, fontSize: 10, color: C.accent, opacity: 0, transition: "opacity .25s" }}></span>
        <div style={{ marginLeft: "auto", display: "flex", gap: 2, background: C.surface, borderRadius: 6, padding: 2, border: `1px solid ${C.border}` }}>
          {[{ k: "summary", l: "总结" }, { k: "transcript", l: `转录 (${hasTranscript ? ep.transcriptSegments.length + "段" : "无"})` }].map(t => (
            <button key={t.k} onClick={() => setTab(t.k)} style={{ fontFamily: mno, fontSize: 11, padding: "4px 14px", color: tab === t.k ? C.bg : C.textSec, background: tab === t.k ? C.accent : "transparent", border: "none", borderRadius: 4, cursor: "pointer", fontWeight: tab === t.k ? 600 : 400 }}>{t.l}</button>
          ))}
        </div>
      </div>

      <div style={{ display: "flex", gap: 0, maxWidth: showSidebar ? 1220 : 960, margin: "0 auto" }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ padding: "16px 24px 0" }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 6, flexWrap: "wrap" }}>
              <h1 style={{ fontFamily: srf, fontSize: 22, fontWeight: 600, color: C.text, margin: 0, lineHeight: 1.3 }}>{ep.title}</h1>
              <span style={{ fontFamily: mno, fontSize: 10, color: C.accentDark, whiteSpace: "nowrap" }}>{ep.date}</span>
            </div>
            {ep.guests?.length > 0 && <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
              {ep.guests.map((g, i) => (
                <span key={i} style={{ fontFamily: mno, fontSize: 10, color: C.blue, padding: "2px 8px", background: "rgba(96,168,240,.06)", border: "1px solid rgba(96,168,240,.12)", borderRadius: 4 }}>{g}{ep.guestBackgrounds?.[i] ? ` · ${ep.guestBackgrounds[i]}` : ""}</span>
              ))}
            </div>}
          </div>
          <div style={{ padding: "12px 24px 32px" }}>
            {tab === "summary" ? (
              <div data-ann-anchor style={{ position: "relative" }}>
                <FormattedSummary text={activeData.detailedSummary || activeData.briefSummary} innerRef={summaryRef} onMouseUp={handleTextSelection} annotations={annotations} corrections={corrections} expansions={expansions} expansionLoading={expansionLoading} expandPendings={expandPendings} onExpandRequest={handleExpandRequest} />
                {/* 浮动工具栏 — 跟随选区 Y 坐标，随页面滚动而滚动（因为是 absolute 定位到 data-ann-anchor 容器） */}
                {pendingSelection && typeof pendingSelection.bottom === "number" && (
                  <div style={{
                    position: "absolute",
                    top: `${pendingSelection.bottom + 6}px`,
                    left: `${Math.max(0, Math.min(pendingSelection.right - 120, 580))}px`,
                    zIndex: 30,
                    display: "flex",
                    gap: 4,
                    background: C.bg,

// Lazy-loaded podcast catalog (5100 entries from xyzrank, ~413KB JSON)
let _catalogCache = null;
async function loadPodcastCatalog() {
  if (_catalogCache) return _catalogCache;
  try {
    const base = document.baseURI || location.href;
    const jsonUrl = new URL("podcast_catalog.json", base).href;
    const r = await fetch(jsonUrl);
    _catalogCache = await r.json();
    return _catalogCache;
  } catch (e) { return []; }
}

function AddModal({ onClose, onAdded }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selected, setSelected] = useState(null);
  const [showManual, setShowManual] = useState(false);
  const [manualName, setManualName] = useState("");
  const [manualUrl, setManualUrl] = useState("");
  const [manualHost, setManualHost] = useState("");
  const [catalogReady, setCatalogReady] = useState(!!_catalogCache);

  // Pre-load catalog when modal opens
  useEffect(() => { loadPodcastCatalog().then(() => setCatalogReady(true)); }, []);

  const doSearch = useCallback(async () => {
    const q = query.trim().toLowerCase();
    if (!q) return;
    setSearching(true);
    setSelected(null);
    const catalog = await loadPodcastCatalog();
    const keywords = q.split(/\s+/).filter(Boolean);
    const matches = catalog.filter(p => {
      const text = `${p.n} ${p.a} ${p.g}`.toLowerCase();
      return keywords.every(kw => text.includes(kw));
    }).map(p => ({ name: p.n, author: p.a, genre: p.g, pid: p.p, rank: p.r, url: `https://www.xiaoyuzhoufm.com/podcast/${p.p}` }));
    // Sort: exact name match first, then by rank
    matches.sort((a, b) => {
      const aEx = a.name.toLowerCase().includes(q) ? 0 : 1;
      const bEx = b.name.toLowerCase().includes(q) ? 0 : 1;
      return aEx !== bEx ? aEx - bEx : a.rank - b.rank;
    });
    setResults(matches.slice(0, 15));
    setSearching(false);
  }, [query]);

  const handleAdd = useCallback(() => {

      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.3)", backdropFilter: "blur(6px)" }} />
      <div style={{ position: "relative", width: "min(480px,94vw)", maxHeight: "85vh", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: "18px 22px", animation: "scaleIn .2s ease", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
          <h3 style={{ fontFamily: srf, fontSize: 18, fontWeight: 600, color: C.text, margin: 0 }}>添加追踪频道</h3>
          <button onClick={() => setShowManual(!showManual)} style={{ fontFamily: mno, fontSize: 10, color: C.accent, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>{showManual ? "搜索添加" : "手动输入"}</button>
        </div>
        <p style={{ fontFamily: mno, fontSize: 10, color: C.textDim, margin: "0 0 12px" }}>搜索播客名称、主持人或分类 (覆盖5000+播客){!catalogReady && !showManual ? " · 加载榜单中..." : ""}</p>

        {showManual ? (

            <input value={manualName} onChange={e => setManualName(e.target.value)} placeholder="频道名称 *" style={inputStyle} />
